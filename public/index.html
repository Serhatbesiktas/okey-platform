<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Sunucusu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* --- GENEL TEMA (İLK RESME BİREBİR UYGUN) --- */
        body { background-color: #0b1c11; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* --- ÜST BİLGİ (HEADER) --- */
        .vip-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #0b1c11; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profil-bilgi { display: flex; align-items: center; gap: 10px; }
        .profil-avatar { width: 45px; height: 45px; background-color: #1a2e20; border-radius: 50%; border: 2px solid #f2c94c; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .profil-isim-kutu { display: flex; flex-direction: column; align-items: flex-start; }
        .profil-isim { font-size: 15px; font-weight: bold; margin: 0; color: #fff; display: flex; align-items: center; gap: 5px;}
        .vip-badge { background-color: #f2c94c; color: #000; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-top: 2px; }
        
        /* Neon Çip Kutusu (İlk resimdeki gibi) */
        .cip-kutu { background-color: #0d2b1a; border: 1px solid #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); padding: 8px 15px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-weight: bold; color: #fff; font-size: 16px; position: relative;}
        .cip-kutu::before { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 10px; pointer-events: none;}
        .cip-ikon { background: #f2c94c; color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: 900; }
        
        /* Sistem Mesajı */
        .sistem-mesaji { padding: 10px 20px; font-size: 12px; color: #8ba895; display: flex; align-items: center; gap: 8px; background-color: #0b1c11; flex-shrink: 0;}
        .sistem-mesaji::before { content: ''; display: inline-block; width: 10px; height: 10px; background-color: #2ecc71; border-radius: 50%; box-shadow: 0 0 5px #2ecc71; }

        /* Lobi Ana Konteyner */
        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        #lobiEkrani { display: flex; flex-direction: column; flex: 1; position: relative; padding-bottom: 100px; /* Alt menü için yer */ }
        
        .masa-sec-baslik { padding: 15px 20px 5px 20px; font-size: 12px; font-weight: 800; color: #6c8a75; letter-spacing: 2px; text-transform: uppercase; }

        .tables-panel { padding: 10px 20px; display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; }
        
        /* --- YENİ MASA KARTLARI (İLK RESME BİREBİR) --- */
        .masa-kart { background-color: #112618; border: 1px solid #1e3f28; border-radius: 15px; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* Masa Watermark Efekti */
        .masa-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 65px; border: 2px solid rgba(255,255,255,0.06); border-radius: 40px; pointer-events: none; }
        .masa-watermark::before, .masa-watermark::after { content: ''; position: absolute; width: 20px; height: 10px; border: 2px solid rgba(255,255,255,0.06); border-radius: 5px; left: 50%; transform: translateX(-50%); }
        .masa-watermark::before { top: -10px; }
        .masa-watermark::after { bottom: -10px; }

        .kart-sol { display: flex; align-items: center; gap: 12px; z-index: 2; }
        .zar-kutu { width: 40px; height: 40px; background-color: rgba(255,255,255,0.1); border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .masa-kart-isim { font-size: 15px; font-weight: bold; color: #fff; }

        .kart-sag { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 2; }
        .masa-kisi-kutu { background-color: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; color: #a0a0a0; display: flex; align-items: center; gap: 5px; }
        
        .btn-otur { background: linear-gradient(180deg, #f9d854 0%, #d4a017 100%); color: #111; border: none; padding: 8px 25px; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; }
        .btn-otur:active { transform: scale(0.95); }
        .btn-otur.disabled { background: #2a3a30; color: #5c7565; box-shadow: none; cursor: not-allowed; }

        /* --- ALT MENÜ VE HEMEN OYNA BUTONU (İLK RESİM) --- */
        .alt-menu-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background-color: #0b1c11; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 10; }
        
        .alt-menu-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #6c8a75; font-size: 10px; font-weight: bold; cursor: pointer; }
        .alt-menu-item.active { color: #f2c94c; }
        .alt-menu-ikon { font-size: 20px; }

        .btn-hemen-oyna { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: linear-gradient(180deg, #f9d854 0%, #d4a017 100%); color: #111; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 900; font-size: 14px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; gap: 2px; width: 180px; }
        .btn-hemen-oyna:active { transform: translateX(-50%) scale(0.95); }
        .btn-hemen-oyna span { font-size: 10px; font-weight: normal; color: rgba(0,0,0,0.7); }

        /* Lobi Oyuncular Paneli (Mobil İçin Gizli, Desktop için Korundu) */
        .players-panel { display: none; } 

        /* --- OYUN MASASI EKRANI (MEKANİK %100 KORUNDU) --- */
        #masaEkrani { display: none; flex: 1; background-color: #0a2014; position: relative; padding: 10px; flex-direction: column; }
        .okey-table-ui { background-color: #1a5c38; border: 4px solid #0d2e1d; border-radius: 20px; width: 100%; flex: 1; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); margin-bottom: 5px; overflow: hidden; }
        
        .return-lobby-btn { position: absolute; top: 5px; right: 5px; background-color: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 10; cursor: pointer; }

        .player-seat { position: absolute; background-color: rgba(0,0,0,0.75); padding: 6px 12px; border-radius: 8px; color: #f2c94c; font-size: 12px; font-weight: bold; border: 2px solid #f2c94c; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; z-index: 5; text-align: center; transition: 0.3s; }
        .seat-top { top: 10px; left: 50%; transform: translateX(-50%); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-right { top: 25%; right: -25px; transform: translateY(-50%) rotate(-90deg); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-left { bottom: 25%; left: -25px; transform: translateY(-50%) rotate(90deg); border-color: #0dcaf0; color: #0dcaf0; }
        
        .aktif-sira { box-shadow: 0 0 15px 5px #2ecc71; border-color: #2ecc71 !important; color: #fff !important; }

        .iskarta-alani { position: absolute; width: 44px; height: 60px; background-color: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; z-index: 4; }
        #iskartaUst { top: 15px; left: 25%; }
        #iskartaSag { top: 25%; right: 30px; transform: translateY(-50%); }
        #iskartaSol { bottom: 25%; left: 30px; transform: translateY(50%); cursor: pointer; }
        #iskartaSol:active { transform: translateY(50%) scale(0.9); }
        
        #benimIskartam { position: absolute; bottom: 100px; right: 15px; width: 60px; height: 80px; background-color: rgba(0,0,0,0.4); border: 3px dashed #f2c94c; border-radius: 8px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s;}
        #benimIskartam.sortable-drag-over { background-color: rgba(242, 201, 76, 0.3); border-color: #fff; }
        .iskarta-yazi { pointer-events: none; color: #f2c94c; font-weight: bold; font-size: 11px; text-align: center; }
        
        .kilitli-iskarta { border-color: #dc3545 !important; opacity: 0.5; }

        .iskarta-alani .okey-tasi { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 38px !important; height: 52px !important; font-size: 18px !important; border-bottom-width: 3px !important; pointer-events: none !important; }

        .masa-ortasi { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 4; }
        .masa-isim-ortasi { color: rgba(255,255,255,0.4); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        
        .masa-kasa-bilgisi { display: none; color: #2ecc71; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px rgba(46, 204, 113, 0.5); border: 1px dashed #2ecc71; padding: 4px 10px; border-radius: 10px; background-color: rgba(0,0,0,0.5); }

        .oyun-baslat-btn { background: linear-gradient(180deg, #f9d854 0%, #d4a017 100%); color: #111; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); margin-top: 5px; }
        .oyun-baslat-btn:active { transform: scale(0.95); }
        
        .kalan-tas-bilgi-container { display: none; flex-direction: column; align-items: center; gap: 8px; }
        
        .kapali-deste { width: 44px; height: 58px; background-color: #fdf6e3; border: 1px solid #d3c9b3; border-bottom: 6px solid #c0b396; border-radius: 6px; box-shadow: -3px 4px 8px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.1s;}
        .kapali-deste:active { transform: translateY(3px); border-bottom-width: 3px; }
        
        .gosterge-tasi { width: 44px; height: 58px; background-color: #fcf5e3; border: 1px solid #d3c9b3; border-bottom: 5px solid #c0b396; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-family: Arial, sans-serif; pointer-events: none; }

        #bitisAlani { position: relative; display: none; width: 48px; height: 64px; background-color: rgba(220, 53, 69, 0.2); border: 2px dashed #dc3545; border-radius: 8px; align-items: center; justify-content: center; color: #dc3545; font-weight: bold; font-size: 11px; text-align: center; }
        #bitisAlani.sortable-drag-over { background-color: rgba(220, 53, 69, 0.6); color: white; border-color: white;}
        #bitisAlani .okey-tasi { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 38px !important; height: 52px !important; font-size: 18px !important; border-bottom-width: 3px !important; pointer-events: none !important; }

        /* ZAFER / BİTİŞ EKRANI */
        #sonucEkrani { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .sonuc-kutu { background: #112618; border: 4px solid #f2c94c; padding: 30px; border-radius: 20px; text-align: center; color: white; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #sonucBaslik { color: #f2c94c; font-size: 28px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        #sonucMetin { font-size: 16px; margin-bottom: 15px; color: #fff; }
        #sonucOdul { font-size: 24px; font-weight: bold; color: #2ecc71; margin-bottom: 25px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        .sonuc-btn { background: linear-gradient(180deg, #f9d854 0%, #d4a017 100%); color: #111; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .sonuc-btn:active { transform: scale(0.95); }

        .pro-tus-takimi { width: 100%; display: flex; justify-content: flex-start; align-items: center; padding: 2px 10px; margin-bottom: 4px; z-index: 10; gap: 10px; }
        .pro-tus { padding: 0 15px; height: 35px; background-color: #112618; border: 1px solid #1e3f28; color: #f2c94c; border-radius: 6px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.5); }
        .pro-tus:active { transform: scale(0.95); background-color: #0b1c11; }

        .istaka-container { width: 100%; height: 140px; background-color: #8b5a2b; border-radius: 10px; border: 4px solid #4a2c10; box-shadow: 0 10px 25px rgba(0,0,0,0.7); display: flex; flex-direction: column; padding: 4px; gap: 4px; position: relative; z-index: 20;}
        .istaka-raf { display: flex; flex: 1; width: 100%; gap: 2px; border-radius: 5px; padding: 3px 2px; }
        .raf-ust { background: linear-gradient(to bottom, #5a3819, #784c25); box-shadow: inset 0 6px 12px rgba(0,0,0,0.6); }
        .raf-alt { background: linear-gradient(to bottom, #a06b3c, #8b5a2b); box-shadow: inset 0 3px 8px rgba(0,0,0,0.4); border-top: 2px solid #a87648; }
        .yuva { flex: 1; height: 100%; background: rgba(0,0,0,0.15); border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .okey-tasi { width: 100%; height: 92%; max-width: 38px; background-color: #fcf5e3; border-radius: 6px; border: 1px solid #d3c9b3; border-bottom: 5px solid #c0b396; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(15px, 4.5vw, 22px); font-family: Arial, sans-serif; cursor: grab; touch-action: manipulation; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; z-index: 30; transition: transform 0.1s;}
        .okey-tasi:active { cursor: grabbing; border-bottom-width: 2px; transform: translateY(3px); }
        .okey-tasi::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1px solid rgba(0,0,0,0.05); border-radius: 4px; }
        
        .sortable-ghost { opacity: 0.1; } 
        .sortable-drag { box-shadow: 5px 15px 25px rgba(0,0,0,0.8) !important; transform: scale(1.15) translateY(-20px) !important; z-index: 99999 !important; border-bottom-width: 8px !important; }
        
        .tas-kirmizi { color: #d32f2f; } .tas-siyah { color: #212529; } .tas-mavi { color: #1976d2; } .tas-sari { color: #198754; } 

        .chat-panel { display: none; } /* Mobil lobi için chat'i gizledik, dilersek açarız */

        @media (min-width: 768px) {
            #lobiEkrani { flex-direction: row; padding-bottom: 0; }
            .tables-panel { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; align-content: start; }
            .players-panel { display: block; width: 350px; border-left: 1px solid rgba(255,255,255,0.05); overflow-y: auto; background-color: #0b1c11; padding: 15px; }
            .istaka-container { height: 160px; max-width: 800px; margin: 0 auto; }
            .alt-menu-container { display: none; } /* Masaüstünde alt menüyü gizle */
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div class="vip-header">
        <div class="profil-bilgi">
            <div class="profil-avatar">😎</div>
            <div class="profil-isim-kutu">
                <p class="profil-isim" id="benimAdimKutusu">Bağlanıyor... <span style="color:#2ecc71;">✔</span></p>
                <span class="vip-badge">VIP GOLD</span>
            </div>
        </div>
        <div class="cip-kutu">
            <div class="cip-ikon">C</div> <span id="benimCipim">Bağlanıyor...</span>
        </div>
    </div>

    <div id="lobiEkrani">
        <div class="sistem-mesaji">
            Sistem: VIP Oyuna Hoş Geldiniz!
        </div>
        
        <div class="masa-sec-baslik">MASA SEÇ</div>

        <div class="tables-panel" id="masalarAlani">
            </div>

        <div class="players-panel">
            <div class="panel-title" style="color:#f2c94c; font-size:14px; margin-bottom:10px;">👥 Lobideki Oyuncular</div>
            <table style="width:100%; font-size:13px; text-align:left; border-collapse:collapse;">
                <thead><tr><th style="color:#6c8a75; padding-bottom:8px; border-bottom:1px solid #1e3f28;">TAKMA AD</th></tr></thead>
                <tbody>
                    <tr><td style="padding:10px 0; border-bottom:1px solid #112618; color:#f2c94c; font-weight:bold;" id="lobiBenimAdim">👑 Yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="alt-menu-container">
            <div class="alt-menu-item active">
                <div class="alt-menu-ikon">🏠</div>
                <span>Lobi</span>
            </div>
            <div class="alt-menu-item">
                <div class="alt-menu-ikon">👥</div>
                <span>Arkadaşlar</span>
            </div>
            
            <button class="btn-hemen-oyna">
                ⚡ Hemen Oyna
                <span>Rastgele Masa</span>
            </button>

            <div class="alt-menu-item" style="margin-left: 60px;"> <div class="alt-menu-ikon">🏆</div>
                <span>Turnuvalar</span>
            </div>
            <div class="alt-menu-item">
                <div class="alt-menu-ikon">🛒</div>
                <span>Mağaza</span>
            </div>
        </div>
    </div>

    <div id="masaEkrani">
        <div id="sonucEkrani">
            <div class="sonuc-kutu">
                <h1 id="sonucBaslik">Oyun Bitti!</h1>
                <p id="sonucMetin">Kazanan: ...</p>
                <p id="sonucOdul"></p>
                <button class="sonuc-btn" onclick="document.getElementById('sonucEkrani').style.display='none'">MASAYA DÖN</button>
            </div>
        </div>

        <div class="okey-table-ui">
            <button class="return-lobby-btn" id="lobiyeDonBtn">⬅ Lobiye Dön</button>
            
            <div class="player-seat seat-top" id="seatTop">Bekleniyor...</div>
            <div class="player-seat seat-left" id="seatLeft">Bekleniyor...</div>
            <div class="player-seat seat-right" id="seatRight">Bekleniyor...</div>
            
            <div class="masa-ortasi">
                <div class="masa-isim-ortasi" id="masaOrtasiYazi">MASA</div>
                <div class="masa-kasa-bilgisi" id="masaKasaBilgisi">KASA: 0 ÇİP</div>
                <button class="oyun-baslat-btn" id="oyunuBaslatBtn">🎲 OYUNU BAŞLAT</button>
                <div class="kalan-tas-bilgi-container" id="oyunAlanObjeleri">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div class="gosterge-tasi" id="gostergeTasi" title="Gösterge"></div>
                        <div class="kapali-deste" id="kalanTasBilgi" title="Taş Çekmek İçin Tıkla">91</div>
                        <div id="bitisAlani">BİTİR<br>🏆</div>
                    </div>
                </div>
            </div>

            <div class="iskarta-alani" id="iskartaUst"></div>
            <div class="iskarta-alani" id="iskartaSag"></div>
            <div class="iskarta-alani" id="iskartaSol" title="Yerden Taş Çek"></div>
            
            <div class="iskarta-alani" id="benimIskartam">
                <div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>
            </div>
        </div>

        <div class="okey-istaka-tuslar-area">
            <div class="pro-tus-takimi">
                <button class="pro-tus" onclick="seriDiz()">SERİ DİZ</button>
                <button class="pro-tus" onclick="ciftDiz()">ÇİFT DİZ</button>
            </div>

            <div class="istaka-container" id="benimIstakam">
                <div class="istaka-raf raf-ust" id="ustRaf"></div>
                <div class="istaka-raf raf-alt" id="altRaf"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const aktifKullaniciAdi = "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        let suAnkiMasam = null; 
        let benimSiramMi = false;

        document.getElementById('benimAdimKutusu').innerHTML = aktifKullaniciAdi + ' <span style="color:#2ecc71;">✔</span>';
        document.getElementById('lobiBenimAdim').innerText = "👑 " + aktifKullaniciAdi;

        socket.emit('kullanici_girisi', aktifKullaniciAdi);

        socket.on('cip_guncelle', (cip) => { document.getElementById('benimCipim').innerText = cip.toLocaleString('tr-TR'); });
        socket.on('cip_guncelle_ozel', (data) => { if(data.isim === aktifKullaniciAdi) document.getElementById('benimCipim').innerText = data.cip.toLocaleString('tr-TR'); });

        socket.on('hata_mesaji', (mesaj) => { alert(mesaj); });

        const lobiEkrani = document.getElementById('lobiEkrani');
        const masaEkrani = document.getElementById('masaEkrani');
        const masaOrtasiYazi = document.getElementById('masaOrtasiYazi');
        const masaKasaBilgisi = document.getElementById('masaKasaBilgisi');
        const masalarAlani = document.getElementById('masalarAlani');
        const lobiyeDonBtn = document.getElementById('lobiyeDonBtn');
        const oyunuBaslatBtn = document.getElementById('oyunuBaslatBtn');
        const oyunAlanObjeleri = document.getElementById('oyunAlanObjeleri');
        const kalanTasBilgi = document.getElementById('kalanTasBilgi');
        const bitisAlani = document.getElementById('bitisAlani');

        const ustRaf = document.getElementById('ustRaf');
        const altRaf = document.getElementById('altRaf');

        function elimdekiTasSayisi() {
            let sayi = 0;
            for(let i=0; i<24; i++) {
                if(document.getElementById('y'+i).children.length > 0) sayi++;
            }
            return sayi;
        }

        function getIstakaGruplari() {
            let gruplar = [];
            let currentGrup = [];
            for(let i=0; i<24; i++) {
                if(i === 12 && currentGrup.length > 0) {
                    gruplar.push(currentGrup);
                    currentGrup = [];
                }
                let yuva = document.getElementById('y'+i);
                if(yuva.children.length > 0) {
                    let tas = yuva.children[0];
                    let renkClass = Array.from(tas.classList).find(c => c.startsWith('tas-'));
                    let renk = renkClass ? renkClass.replace('tas-', '') : '';
                    currentGrup.push({ id: tas.id, renk: renk, sayi: tas.innerText });
                } else {
                    if(currentGrup.length > 0) {
                        gruplar.push(currentGrup);
                        currentGrup = [];
                    }
                }
            }
            if(currentGrup.length > 0) gruplar.push(currentGrup);
            return gruplar;
        }

        const sortableOptions = {
            group: { name: 'istaka', put: (to) => to.el.children.length === 0 },
            animation: 100, delay: 0, forceFallback: true, fallbackOnBody: true, fallbackTolerance: 3, ghostClass: 'sortable-ghost', dragClass: 'sortable-drag', easing: "cubic-bezier(0.25, 1, 0.5, 1)"
        };

        for(let i=0; i<12; i++) {
            const yUst = document.createElement('div'); yUst.className = 'yuva'; yUst.id = 'y'+i; ustRaf.appendChild(yUst); new Sortable(yUst, sortableOptions);
            const yAlt = document.createElement('div'); yAlt.className = 'yuva'; yAlt.id = 'y'+(i+12); altRaf.appendChild(yAlt); new Sortable(yAlt, sortableOptions);
        }

        new Sortable(document.getElementById('benimIskartam'), {
            group: { name: 'istaka', put: function (to) { return benimSiramMi && elimdekiTasSayisi() === 15; }, pull: false },
            animation: 150, forceFallback: true, fallbackOnBody: true, emptyInsertThreshold: 100, 
            onAdd: function (evt) {
                document.getElementById('iskartaYazi').style.display = 'none';
                const atilanTas = evt.item;
                atilanTas.style.position = 'absolute'; atilanTas.style.top = '50%'; atilanTas.style.left = '50%'; atilanTas.style.transform = 'translate(-50%, -50%)'; atilanTas.style.margin = '0';
                
                let renkSinifi = Array.from(atilanTas.classList).find(c=>c.startsWith('tas-'));
                let renk = renkSinifi ? renkSinifi.split('-')[1] : 'siyah';
                socket.emit('tas_atildi', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi, tas: { id: atilanTas.id, renk: renk, sayi: atilanTas.innerText } });
            }
        });

        new Sortable(bitisAlani, {
            group: { name: 'istaka', put: function (to) { return benimSiramMi && elimdekiTasSayisi() === 15; }, pull: false },
            animation: 150, forceFallback: true, fallbackOnBody: true, emptyInsertThreshold: 100, 
            onAdd: function (evt) {
                const atilanTas = evt.item;
                atilanTas.style.position = 'absolute'; atilanTas.style.top = '50%'; atilanTas.style.left = '50%'; atilanTas.style.transform = 'translate(-50%, -50%)'; atilanTas.style.margin = '0';
                let gruplar = getIstakaGruplari(); 
                socket.emit('oyunu_bitir', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi, gruplar: gruplar });
            }
        });

        socket.on('hatali_bitis', (mesaj) => {
            const tas = bitisAlani.querySelector('.okey-tasi');
            if (tas) {
                for(let i=0; i<24; i++) {
                    if(document.getElementById('y'+i).children.length === 0) {
                        document.getElementById('y'+i).appendChild(tas);
                        tas.style.position = ''; tas.style.top = ''; tas.style.left = ''; tas.style.transform = ''; tas.style.margin = '';
                        break;
                    }
                }
            }
            setTimeout(() => { alert(mesaj); }, 100);
        });

        function otomatikTasAt(tasElementi) {
            if (!benimSiramMi || elimdekiTasSayisi() !== 15) return; 
            const iskartaKutusu = document.getElementById('benimIskartam');
            if (iskartaKutusu) {
                iskartaKutusu.appendChild(tasElementi);
                tasElementi.style.position = 'absolute'; tasElementi.style.top = '50%'; tasElementi.style.left = '50%'; tasElementi.style.transform = 'translate(-50%, -50%)'; tasElementi.style.margin = '0';
                document.getElementById('iskartaYazi').style.display = 'none';
                let renkSinifi = Array.from(tasElementi.classList).find(c=>c.startsWith('tas-'));
                let renk = renkSinifi ? renkSinifi.split('-')[1] : 'siyah';
                socket.emit('tas_atildi', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi, tas: { id: tasElementi.id, renk: renk, sayi: tasElementi.innerText } });
            }
        }

        window.seriDiz = function() {
            let taslar = [];
            for(let i=0; i<24; i++) {
                let yuva = document.getElementById('y'+i);
                if(yuva.children.length > 0) {
                    let tas = yuva.children[0];
                    let renkClass = Array.from(tas.classList).find(c => c.startsWith('tas-'));
                    let renk = renkClass ? renkClass.replace('tas-', '') : '';
                    taslar.push({ el: tas, renk: renk, sayi: parseInt(tas.innerText) || 0 });
                }
            }
            const renkDeger = { 'kirmizi': 1, 'siyah': 2, 'mavi': 3, 'sari': 4, 'sahte': 5 };
            taslar.sort((a, b) => { if (renkDeger[a.renk] !== renkDeger[b.renk]) return renkDeger[a.renk] - renkDeger[b.renk]; return a.sayi - b.sayi; });
            taslar.forEach((tasObj, index) => { document.getElementById('y'+index).appendChild(tasObj.el); });
        };

        window.ciftDiz = function() {
            let taslar = [];
            for(let i=0; i<24; i++) {
                let yuva = document.getElementById('y'+i);
                if(yuva.children.length > 0) {
                    let tas = yuva.children[0];
                    let renkClass = Array.from(tas.classList).find(c => c.startsWith('tas-'));
                    let renk = renkClass ? renkClass.replace('tas-', '') : '';
                    taslar.push({ el: tas, renk: renk, sayi: parseInt(tas.innerText) || 0 });
                }
            }
            taslar.sort((a, b) => { if (a.sayi !== b.sayi) return a.sayi - b.sayi; return a.renk.localeCompare(b.renk); });
            taslar.forEach((tasObj, index) => { document.getElementById('y'+index).appendChild(tasObj.el); });
        };

        function kurtarmaSinyaliGonder() {
            if (document.getElementById('oyunuBaslatBtn').style.display !== 'none' && suAnkiMasam) {
                socket.emit('taslarimi_ver', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi });
            }
        }

        kalanTasBilgi.addEventListener('click', () => {
            if (benimSiramMi && elimdekiTasSayisi() === 14) socket.emit('ortadan_tas_cek', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi });
            else if(!benimSiramMi) alert("Şu an sıra sizde değil!");
            else alert("Önce elinizdeki fazlalık taşı sağdaki oyuncuya atmalısınız!");
        });

        document.getElementById('iskartaSol').addEventListener('click', function() {
            if (benimSiramMi && elimdekiTasSayisi() === 14 && this.children.length > 0) {
                const tasEl = this.lastElementChild;
                let renkSinifi = Array.from(tasEl.classList).find(c=>c.startsWith('tas-'));
                let renk = renkSinifi ? renkSinifi.split('-')[1] : 'siyah';
                const tasObj = { id: tasEl.id, sayi: tasEl.innerText, renk: renk };
                
                this.innerHTML = ''; 
                for(let i=0; i<24; i++) {
                    if(document.getElementById('y'+i).children.length === 0) {
                        tasEkle(tasObj, 'y'+i);
                        break;
                    }
                }
                socket.emit('yandan_tas_alindi', { masaAdi: suAnkiMasam, kimAldi: aktifKullaniciAdi, tas: tasObj });
            } else if(!benimSiramMi) alert("Şu an sıra sizde değil!");
            else if(elimdekiTasSayisi() === 15) alert("Elinizde zaten 15 taş var!");
        });

        socket.on('ortaya_tas_atildi', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                let target = null;
                if(data.kimAtti === document.getElementById('seatRight').innerText) target = 'iskartaSag';
                else if(data.kimAtti === document.getElementById('seatTop').innerText) target = 'iskartaUst';
                else if(data.kimAtti === document.getElementById('seatLeft').innerText) target = 'iskartaSol';

                if(target) {
                    const kutu = document.getElementById(target);
                    kutu.innerHTML = ''; 
                    const div = document.createElement('div');
                    div.className = `okey-tasi tas-${data.tas.renk}`; div.innerText = data.tas.sayi; div.id = data.tas.id;
                    div.style.position = 'absolute'; div.style.top = '50%'; div.style.left = '50%'; div.style.transform = 'translate(-50%, -50%)'; div.style.margin = '0'; div.style.pointerEvents = 'none'; 
                    if(target === 'iskartaSol') div.style.pointerEvents = 'auto'; 
                    kutu.appendChild(div);
                }
            }
        });

        socket.on('yandan_alindi_guncelle', (data) => {
            if(data.masaAdi === suAnkiMasam && data.kimAldi !== aktifKullaniciAdi) {
                let source = null;
                if(data.kimAldi === document.getElementById('seatRight').innerText) source = 'benimIskartam';
                else if(data.kimAldi === document.getElementById('seatTop').innerText) source = 'iskartaSag';
                else if(data.kimAldi === document.getElementById('seatLeft').innerText) source = 'iskartaUst';

                if(source) {
                    document.getElementById(source).innerHTML = '';
                    if(source === 'benimIskartam') document.getElementById('benimIskartam').innerHTML = '<div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>';
                }
            }
        });

        socket.on('oyun_bitti', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                const sonucEkrani = document.getElementById('sonucEkrani');
                const baslik = document.getElementById('sonucBaslik');
                const metin = document.getElementById('sonucMetin');
                const odul = document.getElementById('sonucOdul');
                
                if (data.kazanan) {
                    if (data.kazanan === aktifKullaniciAdi) {
                        baslik.innerText = "🏆 TEBRİKLER, KAZANDIN! 🏆";
                    } else {
                        baslik.innerText = "🎉 OYUN BİTTİ 🎉";
                    }
                    metin.innerText = `Kazanan: ${data.kazanan}\nSebep: ${data.sebep}`;
                    odul.innerText = `+${data.odul.toLocaleString('tr-TR')} ÇİP`;
                } else {
                    baslik.innerText = "🛑 OYUN BİTTİ 🛑";
                    metin.innerText = data.sebep || "Masadaki herkes ayrıldı.";
                    odul.innerText = "";
                }
                
                sonucEkrani.style.display = 'flex'; 
                
                oyunAlanObjeleri.style.display = 'none';
                oyunuBaslatBtn.style.display = 'block';
                bitisAlani.style.display = 'none';
                masaKasaBilgisi.style.display = 'none'; 
                bitisAlani.innerHTML = 'BİTİR<br>🏆'; 
                for(let i=0; i<24; i++) document.getElementById('y'+i).innerHTML = '';
                document.getElementById('benimIskartam').innerHTML = '<div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>';
                document.getElementById('iskartaSag').innerHTML = '';
                document.getElementById('iskartaSol').innerHTML = '';
                document.getElementById('iskartaUst').innerHTML = '';
                benimSiramMi = false;
            }
        });

        // --- İLK RESME ÖZEL DİNAMİK KART OLUŞTURUCU (MEKANİK KORUNDU) ---
        socket.on('masalari_guncelle', (lobidekiMasalar) => {
            masalarAlani.innerHTML = ''; 
            for (const [masaAdi, koltuklar] of Object.entries(lobidekiMasalar)) {
                const doluKoltukSayisi = koltuklar.filter(k => k !== null).length;
                const benBuMasadaMiyim = koltuklar.includes(aktifKullaniciAdi);
                
                const html = `
                    <div class="masa-kart">
                        <div class="masa-watermark"></div>
                        <div class="kart-sol">
                            <div class="zar-kutu">🎲</div>
                            <div class="masa-kart-isim">${masaAdi}</div>
                        </div>
                        <div class="kart-sag">
                            <div class="masa-kisi-kutu">🎲 ${doluKoltukSayisi}/4</div>
                            <button class="btn-otur ${benBuMasadaMiyim || doluKoltukSayisi>=4 ? 'disabled':''}" 
                                style="${benBuMasadaMiyim ? 'background:#2ecc71;color:#111;':''}" 
                                onclick="masayaOtur('${masaAdi}')">
                                ${benBuMasadaMiyim ? 'OTURDUN ✓' : (doluKoltukSayisi>=4 ? 'DOLU' : 'OTUR')}
                            </button>
                        </div>
                    </div>`;
                masalarAlani.innerHTML += html;
                if(benBuMasadaMiyim) gelişmişKoltukHizala(koltuklar);
            }
        });

        function gelişmişKoltukHizala(koltuklar) {
            const index = koltuklar.indexOf(aktifKullaniciAdi);
            if (index === -1) return;
            document.getElementById('seatRight').innerText = koltuklar[(index + 1) % 4] || "Bekleniyor...";
            document.getElementById('seatTop').innerText = koltuklar[(index + 2) % 4] || "Bekleniyor...";
            document.getElementById('seatLeft').innerText = koltuklar[(index + 3) % 4] || "Bekleniyor...";
        }

        window.masayaOtur = function(masaAdi) {
            suAnkiMasam = masaAdi;
            socket.emit('masaya_otur', { isim: aktifKullaniciAdi, masaAdi: masaAdi });
            lobiEkrani.style.display = 'none';
            masaEkrani.style.display = 'flex';
            masaOrtasiYazi.innerText = masaAdi.toUpperCase();
        };

        lobiyeDonBtn.addEventListener('click', () => {
            if(suAnkiMasam) socket.emit('masadan_kalk', { isim: aktifKullaniciAdi, masaAdi: suAnkiMasam });
            suAnkiMasam = null;
            masaEkrani.style.display = 'none';
            lobiEkrani.style.display = 'flex';
        });

        oyunuBaslatBtn.addEventListener('click', () => { socket.emit('oyunu_baslat', suAnkiMasam); });

        socket.on('masa_kasa_guncelle', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                masaKasaBilgisi.style.display = 'block';
                masaKasaBilgisi.innerText = 'KASA: ' + data.kasa.toLocaleString('tr-TR') + ' ÇİP';
            }
        });

        socket.on('masa_oyun_basladi', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                oyunuBaslatBtn.style.display = 'none';
                oyunAlanObjeleri.style.display = 'flex';
                bitisAlani.style.display = 'flex';
                kalanTasBilgi.innerText = data.kalanTas;
                if(data.gosterge) {
                    const gostergeDiv = document.getElementById('gostergeTasi');
                    gostergeDiv.innerText = data.gosterge.sayi;
                    gostergeDiv.className = `gosterge-tasi tas-${data.gosterge.renk}`;
                }
                if(data.kasa) {
                    masaKasaBilgisi.style.display = 'block';
                    masaKasaBilgisi.innerText = 'KASA: ' + data.kasa.toLocaleString('tr-TR') + ' ÇİP';
                }
            }
        });

        socket.on('taslari_al', (data) => {
            if (data.kime === aktifKullaniciAdi) {
                for(let i=0; i<24; i++) document.getElementById('y'+i).innerHTML = '';
                data.taslar.forEach((tas, index) => { tasEkle(tas, 'y'+index); });
            }
        });

        socket.on('tas_cekildi', (tas) => {
            for(let i=0; i<24; i++) {
                if(document.getElementById('y'+i).children.length === 0) {
                    tasEkle(tas, 'y'+i);
                    break;
                }
            }
        });

        function tasEkle(tasData, yuvaId) {
            const div = document.createElement('div');
            div.className = `okey-tasi tas-${tasData.renk}`; div.innerText = tasData.sayi; div.id = tasData.id; 
            
            let sonDokunma = 0; let surukleniyorMu = false;
            div.addEventListener('touchstart', () => { surukleniyorMu = false; }, {passive: true});
            div.addEventListener('touchmove', () => { surukleniyorMu = true; }, {passive: true});
            div.addEventListener('touchend', function(e) {
                if(surukleniyorMu) return; 
                const simdi = new Date().getTime();
                if (simdi - sonDokunma < 300) { e.preventDefault(); otomatikTasAt(this); }
                sonDokunma = simdi;
            });
            div.addEventListener('dblclick', function() { otomatikTasAt(this); });

            document.getElementById(yuvaId).appendChild(div);
        }

        socket.on('sira_guncelle', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                kurtarmaSinyaliGonder(); 
                benimSiramMi = (data.kimde === aktifKullaniciAdi);
                
                const iskarta = document.getElementById('benimIskartam');
                if(benimSiramMi) iskarta.classList.remove('kilitli-iskarta');
                else iskarta.classList.add('kilitli-iskarta');

                const koltuklar = [
                    { id: 'benimAdimKutusu', isim: "Ben: " + aktifKullaniciAdi, gercekIsim: aktifKullaniciAdi },
                    { id: 'seatRight', isim: document.getElementById('seatRight').innerText },
                    { id: 'seatTop', isim: document.getElementById('seatTop').innerText },
                    { id: 'seatLeft', isim: document.getElementById('seatLeft').innerText }
                ];
                
                koltuklar.forEach(k => {
                    const el = document.getElementById(k.id);
                    if(k.isim === data.kimde || k.gercekIsim === data.kimde) el.classList.add('aktif-sira');
                    else el.classList.remove('aktif-sira');
                });
            }
        });

        socket.on('masa_ortasi_guncelle', (data) => {
            if(suAnkiMasam === data.masaAdi) {
                kurtarmaSinyaliGonder(); 
                kalanTasBilgi.innerText = data.kalanTas;
                if(data.gosterge) {
                    const gostergeDiv = document.getElementById('gostergeTasi');
                    gostergeDiv.innerText = data.gosterge.sayi;
                    gostergeDiv.className = `gosterge-tasi tas-${data.gosterge.renk}`;
                }
            }
        });
    </script>
</body>
</html>
