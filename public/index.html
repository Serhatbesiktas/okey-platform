<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Premium</title>
    <style>
        /* --- TEMEL LOBİ AYARLARI (Aynı Kaldı) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #040b07; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* Üst Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #07170f; border-bottom: 1px solid #0f2b1c; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .profil-sol { display: flex; align-items: center; gap: 12px; }
        .avatar-kutu { position: relative; }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ffc107; background: linear-gradient(145deg, #1a3c28, #0a1b12); display: flex; justify-content: center; align-items: center; font-size: 20px; box-shadow: 0 0 10px rgba(255, 193, 7, 0.2); }
        .seviye-rozet { position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); background: #111; color: #ffc107; font-size: 9px; padding: 2px 6px; border-radius: 12px; border: 1px solid #ffc107; font-weight: bold; }
        .profil-bilgi { display: flex; flex-direction: column; justify-content: center; }
        .isim-kutu { display: flex; align-items: center; gap: 5px; }
        .kullanici-adi { font-size: 15px; font-weight: 800; }
        .mavi-tik { color: #1da1f2; font-size: 12px; }
        .vip-gold { font-size: 9px; color: #000; background: linear-gradient(90deg, #ffc107, #ffdf00); padding: 2px 5px; border-radius: 5px; font-weight: 900; box-shadow: 0 2px 5px rgba(255, 193, 7, 0.4); display: inline-block; width: fit-content; margin-top: 2px; }
        .profil-sag { display: flex; align-items: center; gap: 12px; }
        .cip-kutu { background: linear-gradient(180deg, #143322, #0d2217); border: 1px solid #1f4a32; border-radius: 25px; padding: 5px 12px 5px 5px; display: flex; align-items: center; gap: 8px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .cip-ikon { width: 22px; height: 22px; background: radial-gradient(circle, #ffdf00, #ffb300); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 11px; }
        .cip-miktar { font-size: 14px; font-weight: 800; color: #fff; }
        .artı-btn { color: #20c997; font-weight: 900; font-size: 18px; cursor: pointer; }
        .ust-ikonlar { display: flex; gap: 12px; }
        .ust-ikon { display: flex; flex-direction: column; align-items: center; font-size: 9px; color: #88a896; cursor: pointer; }
        .ust-ikon i { font-size: 20px; color: #fff; font-style: normal; }

        /* Kayan Yazı */
        .aktivite-banti { background: #050d08; border-bottom: 1px solid rgba(32, 201, 151, 0.1); padding: 6px 0; overflow: hidden; white-space: nowrap; box-shadow: inset 0 -5px 10px rgba(0,0,0,0.5); }
        .kayan-yazi { display: inline-block; padding-left: 100%; animation: kaymaEfekti 25s linear infinite; font-size: 12px; color: #88a896; font-weight: 600; }
        .kayan-yazi span { margin-right: 50px; display: inline-flex; align-items: center; gap: 6px; }
        .yazi-yesil { color: #20c997; }
        .yazi-gold { color: #ffc107; }
        @keyframes kaymaEfekti { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        /* Lobi İçerik */
        #lobiEkrani { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; background: radial-gradient(circle at top, #0a1f13 0%, #040b07 100%); }
        .kategori-baslik { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .kategori-baslik h2 { font-size: 14px; color: #88a896; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 800; }
        .filtre-menusu { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
        .filtre-btn { background: #07170f; border: 1px solid #143322; color: #88a896; padding: 6px 15px; border-radius: 25px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; }
        .filtre-btn.aktif { background: #143322; color: #20c997; border-color: #20c997; box-shadow: 0 0 10px rgba(32, 201, 151, 0.2); }
        .masa-kart { background: linear-gradient(145deg, #0d2217, #07140d); border: 1px solid #1a402b; border-radius: 16px; padding: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.4); }
        .masa-kart.acemi-glow { box-shadow: 0 4px 15px rgba(32, 201, 151, 0.15); border-color: #1a4831; }
        .masa-kart.orta-glow { box-shadow: 0 4px 15px rgba(30, 144, 255, 0.15); border-color: #10344d; }
        .masa-kart.vip-glow { box-shadow: 0 4px 20px rgba(255, 193, 7, 0.15); border-color: #4a3b10; }
        .masa-sol { display: flex; align-items: center; gap: 15px; }
        .zar-kutu { width: 46px; height: 46px; background: linear-gradient(135deg, #1a402b, #0d2217); border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; border: 1px solid #204d33; }
        .masa-isim { font-size: 15px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .masa-etiket { font-size: 9px; padding: 2px 6px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }
        .etiket-yesil { background: rgba(32, 201, 151, 0.15); color: #20c997; border: 1px solid rgba(32, 201, 151, 0.3); }
        .etiket-mavi { background: rgba(30, 144, 255, 0.15); color: #1e90ff; border: 1px solid rgba(30, 144, 255, 0.3); }
        .etiket-gold { background: rgba(255, 193, 7, 0.15); color: #ffc107; border: 1px solid rgba(255, 193, 7, 0.3); }
        .masa-bahis { font-size: 12px; color: #ffc107; font-weight: 800; }
        .masa-sag { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .doluluk-durum { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .mini-avatarlar { display: flex; }
        .mini-avatar { width: 22px; height: 22px; border-radius: 50%; background: #2c3e50; border: 2px solid #0d2217; margin-left: -8px; display: flex; justify-content: center; align-items: center; font-size: 10px; }
        .mini-avatar.bos { background: rgba(20, 51, 34, 0.3); border: 1px dashed rgba(32, 201, 151, 0.3); color: transparent; }
        .kisi-sayisi { font-size: 11px; color: #a8c4b5; font-weight: 800; }
        .bos-yazisi { font-size: 11px; color: #88a896; font-style: italic; }
        .oyna-btn { background: linear-gradient(180deg, #20c997, #17a57a); color: #000; border: none; padding: 8px 24px; border-radius: 8px; font-weight: 900; font-size: 13px; cursor: pointer; box-shadow: 0 4px 12px rgba(32, 201, 151, 0.35); }
        .oyna-btn.dolu { background: #143322; color: #5a7d68; box-shadow: none; border: 1px solid #1f4a32; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(6, 17, 10, 0.97); border-top: 1px solid #143322; display: flex; justify-content: space-around; align-items: flex-end; padding: 10px 0 20px 0; z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #6a8c79; font-size: 11px; cursor: pointer; }
        .nav-item i { font-size: 22px; font-style: normal; }
        .nav-item.aktif { color: #20c997; font-weight: bold; }
        .hemen-oyna-kutu { background: linear-gradient(180deg, #ffdf00, #ffb300); color: #000; padding: 12px 26px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; transform: translateY(-20px); box-shadow: 0 6px 20px rgba(255, 193, 7, 0.4); border: 2px solid #111; cursor: pointer; }
        .hemen-oyna-kutu span { font-weight: 900; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .hemen-oyna-kutu small { font-size: 9px; font-weight: 800; opacity: 0.8; }

        /* --- YENİ: ASIL OYUN MASASI (Premium Yeşil Çuha) --- */
        #masaEkrani { display: none; flex-direction: column; height: 100%; width: 100%; background-color: #030805; position: relative; }
        
        .masa-ust-panel { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); z-index: 5; }
        .geri-btn { background: #dc3545; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(220, 53, 69, 0.4); }
        .masa-isim-tabela { font-size: 16px; font-weight: 900; color: #ffc107; text-shadow: 1px 1px 5px rgba(0,0,0,1); }
        
        .oyun-alani { flex: 1; margin: 15px; position: relative; background: radial-gradient(circle, #1a6b38 0%, #082e16 100%); border-radius: 40px; box-shadow: inset 0 0 40px rgba(0,0,0,0.8), 0 10px 30px rgba(0,0,0,0.5); border: 8px solid #3d2314; display: flex; justify-content: center; align-items: center; }
        
        /* Masadaki Oyuncular (Avatarlar) */
        .masadaki-oyuncu { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .o-ust { top: 10px; }
        .o-sol { left: 10px; }
        .o-sag { right: 10px; }
        .o-ben { bottom: 90px; } /* Istakanın hemen üstü */
        
        .oyuncu-cerceve { width: 50px; height: 50px; border-radius: 50%; background: #111; border: 3px solid #20c997; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.6); position: relative; }
        .oyuncu-isim-kutu { background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 10px; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Ortadaki Taş Gösterge Alanı */
        .orta-saha { display: flex; gap: 20px; align-items: center; }
        .gosterge-kutu { width: 55px; height: 75px; background: rgba(0,0,0,0.3); border: 2px dashed rgba(255,255,255,0.3); border-radius: 8px; display: flex; justify-content: center; align-items: center; flex-direction: column; color: #fff; font-size: 10px; font-weight: bold; }
        
        /* Oyuncunun Istakası (Ahşap) */
        .istaka-alani { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: center; padding-bottom: 20px; }
        .istaka { width: 90%; max-width: 600px; height: 80px; background: linear-gradient(180deg, #6e4120, #38200e); border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.8), inset 0 5px 10px rgba(255,255,255,0.1); border-bottom: 6px solid #1a0f06; display: flex; align-items: center; padding: 0 10px; gap: 3px; overflow-x: auto; }
        
        /* Okey Taşı Tasarımı */
        .okey-tasi { min-width: 38px; height: 55px; background: linear-gradient(180deg, #fffcf2, #e8dfc8); border-radius: 6px; box-shadow: 2px 3px 6px rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; font-size: 22px; cursor: pointer; border-bottom: 3px solid #ccc1a8; }
        .t-kirmizi { color: #d32f2f; }
        .t-siyah { color: #212121; }
        .t-mavi { color: #1976d2; }
        .t-sari { color: #fbc02d; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="lobiEkrani">
        <div class="top-bar">
            <div class="profil-sol">
                <div class="avatar-kutu"><div class="avatar-img">😎</div><div class="seviye-rozet">Lv.42</div></div>
                <div class="profil-bilgi">
                    <div class="isim-kutu"><span class="kullanici-adi" id="benimAdim">Yükleniyor...</span><span class="mavi-tik">✔</span></div>
                    <span class="vip-gold">VIP GOLD</span>
                </div>
            </div>
            <div class="profil-sag">
                <div class="cip-kutu"><div class="cip-ikon">C</div><span class="cip-miktar" id="benimCipim">0</span><span class="artı-btn">+</span></div>
                <div class="ust-ikonlar"><div class="ust-ikon"><i>⚙️</i></div></div>
            </div>
        </div>

        <div class="aktivite-banti">
            <div class="kayan-yazi">
                <span>🟢 <b class="yazi-yesil">Ahmet_34</b> Oyuna Katıldı!</span>
                <span>🔥 <b class="yazi-gold">Haftalık Turnuva</b> Çok Yakında!</span>
            </div>
        </div>

        <div class="main-content">
            <div class="kategori-baslik"><h2>Masa Seç</h2></div>
            <div id="masalarAlani"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item aktif"><i>🏠</i><span>Lobi</span></div>
            <div class="nav-item"><i>👥</i><span>Arkadaşlar</span></div>
            <div class="hemen-oyna-kutu"><span>⚡ HEMEN OYNA</span><small>Rastgele Masa</small></div>
            <div class="nav-item"><i>🏆</i><span>Turnuvalar</span></div>
            <div class="nav-item"><i>🛒</i><span>Mağaza</span></div>
        </div>
    </div>

    <div id="masaEkrani">
        <div class="masa-ust-panel">
            <button class="geri-btn" onclick="lobiyeDon()">⬅ Çıkış</button>
            <span class="masa-isim-tabela" id="aktifMasaIsmi">VIP Okey Masası</span>
            <div style="width: 80px;"></div> </div>

        <div class="oyun-alani">
            
            <div class="masadaki-oyuncu o-ust">
                <div class="oyuncu-cerceve" style="border-color: #88a896;">👤</div>
                <div class="oyuncu-isim-kutu">Bekleniyor...</div>
            </div>
            <div class="masadaki-oyuncu o-sol">
                <div class="oyuncu-cerceve" style="border-color: #88a896;">👤</div>
                <div class="oyuncu-isim-kutu">Bekleniyor...</div>
            </div>
            <div class="masadaki-oyuncu o-sag">
                <div class="oyuncu-cerceve" style="border-color: #88a896;">👤</div>
                <div class="oyuncu-isim-kutu">Bekleniyor...</div>
            </div>

            <div class="orta-saha">
                <div class="gosterge-kutu">
                    <span style="margin-bottom:5px;">GÖSTERGE</span>
                    <div class="okey-tasi t-mavi" style="transform: scale(0.8);">8</div>
                </div>
            </div>

            <div class="istaka-alani">
                <div class="masadaki-oyuncu o-ben">
                    <div class="oyuncu-cerceve">😎</div>
                    <div class="oyuncu-isim-kutu" style="color: #ffc107;">Sen</div>
                </div>

                <div class="istaka">
                    <div class="okey-tasi t-kirmizi">12</div>
                    <div class="okey-tasi t-kirmizi">13</div>
                    <div class="okey-tasi t-siyah">1</div>
                    <div style="width: 15px;"></div> <div class="okey-tasi t-sari">5</div>
                    <div class="okey-tasi t-sari">5</div>
                    <div class="okey-tasi t-sari">5</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const socket = io();
        let aktifKullaniciAdi = localStorage.getItem('vip_okey_isim') || "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        document.getElementById('benimAdim').innerText = aktifKullaniciAdi;

        socket.on('connect', () => { socket.emit('kullanici_girisi', aktifKullaniciAdi); });

        socket.on('cip_guncelle', (cip) => { 
            document.getElementById('benimCipim').innerText = cip.toLocaleString('tr-TR'); 
        });

        socket.on('masalari_guncelle', (lobidekiMasalar) => {
            const masalarAlani = document.getElementById('masalarAlani');
            masalarAlani.innerHTML = ''; 

            for (const [masaAdi, koltuklar] of Object.entries(lobidekiMasalar)) {
                const doluSayisi = koltuklar.filter(k => k !== null).length;
                let bahis = masaAdi.includes('Acemi') ? '20K' : (masaAdi.includes('Orta') ? '50K' : '100K');
                let glowClass = masaAdi.includes('Acemi') ? 'acemi-glow' : (masaAdi.includes('Orta') ? 'orta-glow' : 'vip-glow');

                let avatarHtml = '';
                for(let i=0; i<4; i++) {
                    if(i < doluSayisi) avatarHtml += `<div class="mini-avatar">👤</div>`;
                    else avatarHtml += `<div class="mini-avatar bos"></div>`;
                }

                const btnClass = doluSayisi >= 4 ? 'oyna-btn dolu' : 'oyna-btn';
                const btnText = doluSayisi >= 4 ? 'DOLU' : 'OYNA';

                const html = `
                    <div class="masa-kart ${glowClass}">
                        <div class="masa-sol">
                            <div class="zar-kutu">🎲</div>
                            <div>
                                <div class="masa-isim">${masaAdi}</div>
                                <div class="masa-bahis">💰 ${bahis} Bahis</div>
                            </div>
                        </div>
                        <div class="masa-sag">
                            <div class="doluluk-durum">
                                <div class="mini-avatarlar">${avatarHtml}</div>
                                <span class="${doluSayisi===0 ? 'bos-yazisi' : 'kisi-sayisi'}">${doluSayisi===0 ? 'Masa Boş' : doluSayisi+'/4'}</span>
                            </div>
                            <button class="${btnClass}" onclick="masayaGir('${masaAdi}')" ${doluSayisi >= 4 ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    </div>`;
                masalarAlani.innerHTML += html;
            }
        });

        // MASAYA GİRİŞ İŞLEMİ
        window.masayaGir = function(masaIsmi) {
            socket.emit('masaya_otur', { isim: aktifKullaniciAdi, masaAdi: masaIsmi });
            document.getElementById('lobiEkrani').style.display = 'none';
            document.getElementById('masaEkrani').style.display = 'flex';
            document.getElementById('aktifMasaIsmi').innerText = masaIsmi;
        };

        // LOBİYE DÖNÜŞ İŞLEMİ
        window.lobiyeDon = function() {
            // Şimdilik sadece görsel olarak dönüyoruz (soket ayrılma işlemi eklenecek)
            document.getElementById('masaEkrani').style.display = 'none';
            document.getElementById('lobiEkrani').style.display = 'flex';
        };
    </script>
</body>
</html>
