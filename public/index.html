<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Sunucusu</title>
    <style>
        /* OYUN MASASI VE TASARIM KODLARI (Mobilde Bozulmayan Sürüm) */
        body {
            background-color: #0b4515; /* Koyu okey masası yeşili */
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #ust-bilgi {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        #oyunuBaslatBtn {
            margin: 20px auto;
            padding: 15px 30px;
            font-size: 18px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #oyunAlanObjeleri {
            flex: 1;
            position: relative;
            display: none; /* Oyun başlayana kadar gizli */
            width: 100%;
            height: 100%;
        }
        /* ISTAKA TASARIMI */
        #istaka {
            position: absolute;
            bottom: 5%; /* Telefondan taşmaması için % ile ayarladık */
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 800px;
            background: linear-gradient(to bottom, #8d6e63, #4e342e); /* Ahşap doku hissi */
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(2, 1fr); /* 2 satır */
            gap: 4px;
        }
        .slot {
            background: rgba(0, 0, 0, 0.4);
            border: 1px inset rgba(255,255,255,0.1);
            border-radius: 5px;
            height: 50px; /* MOBİLDE KAYBOLMAMASI İÇİN SABİT YÜKSEKLİK */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        @media (max-width: 400px) {
            .slot { height: 40px; } /* Çok küçük ekranlar için ufak ayar */
        }
        /* TAŞ ATMA YERİ (SAĞ TARAF) */
        #benimIskartam {
            position: absolute;
            right: 15px;
            top: 25%;
            width: 65px;
            height: 85px;
            background: rgba(0,0,0,0.5);
            border: 2px dashed #f39c12;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        .iskarta-yazi {
            font-size: 11px;
            color: #f39c12;
            font-weight: bold;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div id="ust-bilgi">Sunucuya Bağlanılıyor...</div>
    
    <button id="oyunuBaslatBtn" style="display:none;" onclick="oyunuBaslat()">Oyunu Başlat (Botları Ekle)</button>
    
    <div id="oyunAlanObjeleri">
        <div id="benimIskartam">
            <div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>
        </div>

        <div id="istaka">
            </div>
    </div>

    <script>
        // HTML içindeki slotları otomatik oluştur (y0'dan y23'e kadar)
        const istaka = document.getElementById('istaka');
        for(let i=0; i<24; i++) {
            istaka.innerHTML += `<div id="y${i}" class="slot"></div>`;
        }

        const socket = io();
        let suAnkiMasam = null;
        let kullaniciAdim = "Oyuncu_" + Math.floor(Math.random() * 1000); 

        // Sayfa açılınca otomatik "Acemiler" masasına otur (Test için)
        setTimeout(() => {
            suAnkiMasam = 'Acemiler';
            document.getElementById('ust-bilgi').innerText = `${suAnkiMasam} Masasına Oturuldu. Bekleniyor...`;
            socket.emit('masaya_otur', { masaAdi: suAnkiMasam, isim: kullaniciAdim });
            document.getElementById('oyunuBaslatBtn').style.display = 'block';
        }, 500);

        // OYUNU BAŞLAT BUTONU
        function oyunuBaslat() {
            if (suAnkiMasam) {
                socket.emit('oyunu_baslat', { masaAdi: suAnkiMasam });
                document.getElementById('oyunuBaslatBtn').style.display = 'none';
                document.getElementById('ust-bilgi').innerText = "Oyun Başlatıldı!";
            }
        }

        // SUNUCUDAN GELEN OYUN BAŞLADI SİNYALİ
        socket.on('oyun_basladi', (data) => {
            if (data.masaAdi === suAnkiMasam) {
                // Oyun alanını (masayı ve ıstakayı) görünür yap
                document.getElementById('oyunAlanObjeleri').style.display = 'block';
                document.getElementById('ust-bilgi').innerText = "Oyun Başladı! Botlar masada.";
            }
        });

        // EKRAN SIFIRLAMA FONKSİYONU
        function masayiSifirla() {
            document.getElementById('oyunAlanObjeleri').style.display = 'none';
            document.getElementById('oyunuBaslatBtn').style.display = 'block';
            for(let i=0; i<24; i++) {
                let slot = document.getElementById('y'+i);
                if(slot) slot.innerHTML = '';
            }
            document.getElementById('benimIskartam').innerHTML = '<div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>';
        }

    </script>
</body>
</html>
