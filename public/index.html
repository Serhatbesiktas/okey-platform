<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Sunucusu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d2e1d; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #081e13; border-bottom: 2px solid #14422b; flex-shrink: 0; }
        .logo { color: #ffc107; font-weight: bold; font-size: 14px; }
        .stats-box { background-color: #14422b; padding: 5px 10px; border-radius: 5px; border: 1px solid #198754; font-size: 11px; text-align: center; }
        .stats-box span { color: #20c997; display: block; font-weight: bold; }
        .user-box { background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }

        /* --- LOBİ EKRANI --- */
        #lobiEkrani { display: flex; flex-direction: column; flex: 1; }
        .tables-panel { padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .table-card { background-color: #14422b; border: 2px solid #198754; border-radius: 10px; padding: 15px 10px; text-align: center; }
        .table-title { color: #ffc107; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        
        .mini-table-container { position: relative; height: 130px; margin: 0 auto 15px auto; width: 100%; max-width: 250px; background-color: rgba(0,0,0,0.15); border-radius: 10px; }
        .mini-okey-table { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 50px; background-color: #1a5c38; border: 2px solid #0a2014; border-radius: 25px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .mini-seat { position: absolute; font-size: 10px; line-height: 1.2; text-align: center; width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mini-seat.occupied { color: #0dcaf0; font-weight: bold; }
        .mini-seat.empty { color: #a0a0a0; font-style: italic; }
        .mini-top { top: 5px; left: 50%; transform: translateX(-50%); }
        .mini-bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .mini-left { top: 50%; left: 5px; transform: translateY(-50%); }
        .mini-right { top: 50%; right: 5px; transform: translateY(-50%); }

        .sit-btn { background-color: #ffc107; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; transition: 0.3s; }
        .sit-btn.disabled { background-color: #6c757d; color: #fff; cursor: not-allowed; }

        .players-panel { background-color: #0b2417; border-top: 2px solid #14422b; padding: 10px; }
        .panel-title { font-size: 14px; margin-bottom: 10px; color: #0dcaf0; display: flex; gap: 5px; }
        .player-table { width: 100%; font-size: 12px; text-align: left; border-collapse: collapse; }
        .player-table th { color: #a0a0a0; padding-bottom: 5px; border-bottom: 1px solid #14422b; }
        .player-table td { padding: 8px 0; border-bottom: 1px solid #0d2e1d; }
        .status-dot { width: 8px; height: 8px; background-color: #20c997; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* --- MASA EKRANI --- */
        #masaEkrani { display: none; flex: 1; background-color: #0a2014; position: relative; padding: 10px; flex-direction: column; }
        
        .okey-table-ui { background-color: #1a5c38; border: 4px solid #0d2e1d; border-radius: 20px; width: 100%; flex: 1; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .table-center-info { text-align: center; color: rgba(255,255,255,0.15); font-weight: bold; font-size: 20px; padding: 10px; }
        .player-seat { position: absolute; background-color: rgba(0,0,0,0.75); padding: 6px 12px; border-radius: 8px; color: #ffc107; font-size: 12px; font-weight: bold; border: 1px solid #ffc107; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .seat-top { top: 10px; left: 50%; transform: translateX(-50%); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-left { left: -10px; top: 50%; transform: translateY(-50%) rotate(-90deg); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-right { right: -10px; top: 50%; transform: translateY(-50%) rotate(90deg); border-color: #0dcaf0; color: #0dcaf0; }
        .return-lobby-btn { position: absolute; top: 5px; right: 5px; background-color: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 10; cursor: pointer; }

        /* --- ISTAKA VE TAŞLAR (YENİLENMİŞ ESNEK YAPI) --- */
        .istaka-container {
            width: 100%;
            height: 120px;
            background: linear-gradient(to bottom, #d4a373, #8b5a2b);
            border-radius: 10px;
            border: 3px solid #5c3a21;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 5px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 4px;
            position: relative;
        }
        
        .istaka-row { 
            display: flex; 
            height: 50%; 
            width: 100%; 
            align-items: center; 
            justify-content: center; /* Taşları tam ortalar */
            gap: 2px; /* Taşlar arası minimum boşluk */
        }
        
        /* Okey Taşı - Ekrandan Taşmayı Önleyen Kodlar */
        .okey-tasi {
            flex: 0 1 36px; /* İhtiyaç halinde küçülür, en fazla 36px olur */
            height: 48px;
            background-color: #fdf6e3;
            border-radius: 5px;
            border: 1px solid #d3c9b3;
            box-shadow: 1px 2px 3px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(16px, 5vw, 22px); /* Ekrana göre fontu da küçültür */
            font-family: Arial, sans-serif;
            position: relative;
            cursor: grab;
            
            /* Sürükleme Akıcılığı İçin Zorunlu */
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }
        .okey-tasi:active { cursor: grabbing; }
        .okey-tasi::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1px solid rgba(0,0,0,0.05); border-radius: 3px; }
        
        /* Boş Yuvalar (Oymalar) */
        .bos-yuva {
            flex: 0 1 36px;
            height: 48px;
            background-color: rgba(0,0,0,0.2); 
            border-radius: 5px;
            box-shadow: inset 1px 1px 4px rgba(0,0,0,0.5);
            pointer-events: none; /* Sürüklenemez */
        }

        /* Pro Sürükleme Efektleri */
        .sortable-ghost { opacity: 0; } 
        .sortable-drag { box-shadow: 5px 5px 15px rgba(0,0,0,0.7); transform: scale(1.15) translateY(-15px); z-index: 9999 !important; }
        
        .tas-kirmizi { color: #dc3545; }
        .tas-siyah { color: #212529; }
        .tas-mavi { color: #0d6efd; }
        .tas-sari { color: #e67e22; }

        /* --- SOHBET --- */
        .chat-panel { background-color: #081e13; border-top: 2px solid #14422b; display: flex; flex-direction: column; height: 180px; flex-shrink: 0; z-index: 999; }
        .chat-header { font-size: 12px; padding: 5px 10px; background-color: #05140d; color: #a0a0a0; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .msg-line { line-height: 1.4; padding-bottom: 3px;}
        .msg-author { color: #0dcaf0; font-weight: bold; }
        .msg-author.system { color: #ffc107; }
        .chat-input-area { display: flex; padding: 8px; gap: 8px; background-color: #0b2417; padding-bottom: calc(8px + env(safe-area-inset-bottom, 10px)); }
        .chat-input-area input { flex: 1; background-color: #0d2e1d; border: 1px solid #198754; color: #fff; padding: 12px; border-radius: 5px; outline: none; font-size: 16px; }
        .chat-input-area button { background-color: #0dcaf0; color: #000; border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }

        @media (min-width: 768px) {
            #lobiEkrani { flex-direction: row; }
            .tables-panel { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; align-content: start; }
            .players-panel { width: 350px; border-top: none; border-left: 2px solid #14422b; overflow-y: auto; }
            .okey-tasi, .bos-yuva { flex-basis: 42px; height: 55px; }
            .istaka-container { height: 140px; max-width: 800px; margin: 0 auto; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div class="header">
        <div class="logo">🏆 VIP OKEY<br>SUNUCUSU</div>
        <div class="stats-box">250.000<span>ÇİP</span></div>
        <div class="user-box" id="benimAdimKutusu">Bağlanıyor...</div>
    </div>

    <div id="lobiEkrani">
        <div class="tables-panel" id="masalarAlani"></div>
        <div class="players-panel">
            <div class="panel-title">👥 Lobideki Oyuncular</div>
            <table class="player-table">
                <thead><tr><th>DRM</th><th>TAKMA AD</th><th>PUAN</th></tr></thead>
                <tbody>
                    <tr><td><span class="status-dot"></span></td><td style="color:#ffc107; font-weight:bold;" id="lobiBenimAdim">👑 Yükleniyor...</td><td>250K</td></tr>
                    <tr><td><span class="status-dot"></span></td><td>Gamze</td><td>120K</td></tr>
                    <tr><td><span class="status-dot"></span></td><td>Deniz</td><td>45K</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="masaEkrani">
        <div class="okey-table-ui">
            <button class="return-lobby-btn" id="lobiyeDonBtn">⬅ Lobiye Dön</button>
            <div class="table-center-info" id="masaOrtasiYazi">MASA</div>
            <div class="player-seat seat-top" id="seatTop">Bekleniyor...</div>
            <div class="player-seat seat-left" id="seatLeft">Bekleniyor...</div>
            <div class="player-seat seat-right" id="seatRight">Bekleniyor...</div>
        </div>

        <div class="istaka-container" id="benimIstakam">
            <div class="istaka-row" id="istakaUstSira"></div>
            <div class="istaka-row" id="istakaAltSira"></div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header">💬 Sunucu Genel Sohbet</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Genel lobiye yaz...">
            <button id="sendBtn">GÖNDER</button>
        </div>
    </div>

    <script>
        const socket = io();
        const aktifKullaniciAdi = "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        let suAnkiMasam = null; 

        document.getElementById('benimAdimKutusu').innerText = aktifKullaniciAdi;
        document.getElementById('lobiBenimAdim').innerText = "👑 " + aktifKullaniciAdi;

        const lobiEkrani = document.getElementById('lobiEkrani');
        const masaEkrani = document.getElementById('masaEkrani');
        const masaOrtasiYazi = document.getElementById('masaOrtasiYazi');
        const masalarAlani = document.getElementById('masalarAlani');
        const lobiyeDonBtn = document.getElementById('lobiyeDonBtn');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');

        // SIFIR GECİKMELİ PRO SÜRÜKLEME AYARLARI
        const sortableOptions = {
            group: 'shared', 
            animation: 100, // Çok daha hızlı kayma
            delay: 0, // ANINDA TEPKİ (Akıcılığın sırrı)
            forceFallback: true, 
            fallbackClass: 'sortable-drag',
            ghostClass: 'sortable-ghost',
            filter: '.bos-yuva', 
            preventOnFilter: false, // Boşlukların arasına taş konmasına izin verir
            direction: 'horizontal',
            easing: "cubic-bezier(0.25, 1, 0.5, 1)"
        };

        new Sortable(document.getElementById('istakaUstSira'), sortableOptions);
        new Sortable(document.getElementById('istakaAltSira'), sortableOptions);

        socket.on('masalari_guncelle', (masalarData) => {
            masalarAlani.innerHTML = ''; 
            for (const [masaAdi, koltuklar] of Object.entries(masalarData)) {
                const doluKoltuklar = koltuklar.filter(k => k !== null);
                const doluKoltukSayisi = doluKoltuklar.length;
                const benBuMasadaMiyim = koltuklar.includes(aktifKullaniciAdi);

                const pBottom = koltuklar[0] ? `<span style="font-size:14px;">👤</span><br>${koltuklar[0]}` : `Boş`;
                const cBottom = koltuklar[0] ? 'occupied' : 'empty';
                const pRight = koltuklar[1] ? `<span style="font-size:14px;">👤</span><br>${koltuklar[1]}` : `Boş`;
                const cRight = koltuklar[1] ? 'occupied' : 'empty';
                const pTop = koltuklar[2] ? `<span style="font-size:14px;">👤</span><br>${koltuklar[2]}` : `Boş`;
                const cTop = koltuklar[2] ? 'occupied' : 'empty';
                const pLeft = koltuklar[3] ? `<span style="font-size:14px;">👤</span><br>${koltuklar[3]}` : `Boş`;
                const cLeft = koltuklar[3] ? 'occupied' : 'empty';

                const miniTableHTML = `
                    <div class="mini-table-container">
                        <div class="mini-okey-table"></div>
                        <div class="mini-seat mini-bottom ${cBottom}">${pBottom}</div>
                        <div class="mini-seat mini-right ${cRight}">${pRight}</div>
                        <div class="mini-seat mini-top ${cTop}">${pTop}</div>
                        <div class="mini-seat mini-left ${cLeft}">${pLeft}</div>
                    </div>
                `;

                let btnClass = "sit-btn";
                let btnText = `OTUR (${doluKoltukSayisi}/4)`;
                let btnStyle = "";
                let disabledAttr = "";

                if (benBuMasadaMiyim) {
                    btnClass += " disabled";
                    btnText = "OTURDUN ✓";
                    btnStyle = "background-color: #20c997; color: white;";
                    disabledAttr = "disabled";
                    gelişmişKoltukHizala(koltuklar);
                } else if (doluKoltukSayisi >= 4) {
                    btnClass += " disabled";
                    btnText = "MASA DOLU (4/4)";
                    disabledAttr = "disabled";
                }

                const masaHTML = `
                    <div class="table-card">
                        <div class="table-title">${masaAdi}</div>
                        ${miniTableHTML}
                        <button class="${btnClass}" style="${btnStyle}" ${disabledAttr} onclick="masayaOtur('${masaAdi}')">${btnText}</button>
                    </div>
                `;
                masalarAlani.innerHTML += masaHTML;
            }
        });

        function gelişmişKoltukHizala(koltuklar) {
            const benimIndexim = koltuklar.indexOf(aktifKullaniciAdi);
            if (benimIndexim === -1) return;

            const sagIndex = (benimIndexim + 1) % 4;
            const karsiIndex = (benimIndexim + 2) % 4;
            const solIndex = (benimIndexim + 3) % 4;

            document.getElementById('seatRight').innerText = koltuklar[sagIndex] ? koltuklar[sagIndex] : "Bekleniyor...";
            document.getElementById('seatTop').innerText = koltuklar[karsiIndex] ? koltuklar[karsiIndex] : "Bekleniyor...";
            document.getElementById('seatLeft').innerText = koltuklar[solIndex] ? koltuklar[solIndex] : "Bekleniyor...";
        }

        window.masayaOtur = function(masaAdi) {
            suAnkiMasam = masaAdi;
            socket.emit('masaya_otur', { isim: aktifKullaniciAdi, masaAdi: masaAdi });
            lobiEkrani.style.display = 'none';
            masaEkrani.style.display = 'flex';
            masaOrtasiYazi.innerText = masaAdi.toUpperCase();
            
            ilkOyuncuTaslariniDiz();
        };

        lobiyeDonBtn.addEventListener('click', () => {
            if(suAnkiMasam) {
                socket.emit('masadan_kalk', { isim: aktifKullaniciAdi, masaAdi: suAnkiMasam });
                suAnkiMasam = null;
            }
            masaEkrani.style.display = 'none';
            lobiEkrani.style.display = 'flex';
            
            document.getElementById('istakaUstSira').innerHTML = '';
            document.getElementById('istakaAltSira').innerHTML = '';
        });

        // TAM ORANTILI 11'ERLİ DİZİLİM (Taşma kesinlikle yapmaz)
        function ilkOyuncuTaslariniDiz() {
            const ustSira = document.getElementById('istakaUstSira');
            const altSira = document.getElementById('istakaAltSira');
            
            ustSira.innerHTML = '';
            altSira.innerHTML = '';

            // Üst Sıra (8 Taş, 3 Boşluk = 11 Eleman)
            ustSira.innerHTML += `<div class="okey-tasi tas-kirmizi">7</div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-kirmizi">8</div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-kirmizi">9</div>`;
            ustSira.innerHTML += `<div class="bos-yuva"></div>`; 
            ustSira.innerHTML += `<div class="okey-tasi tas-siyah">12</div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-siyah">13</div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-siyah">1</div>`;
            ustSira.innerHTML += `<div class="bos-yuva"></div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-mavi">2</div>`;
            ustSira.innerHTML += `<div class="okey-tasi tas-mavi">3</div>`;
            ustSira.innerHTML += `<div class="bos-yuva"></div>`;

            // Alt Sıra (7 Taş, 4 Boşluk = 11 Eleman)
            altSira.innerHTML += `<div class="bos-yuva"></div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-mavi">4</div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-sari">4</div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-siyah">4</div>`;
            altSira.innerHTML += `<div class="bos-yuva"></div>`; 
            altSira.innerHTML += `<div class="okey-tasi tas-kirmizi">11</div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-siyah">11</div>`;
            altSira.innerHTML += `<div class="bos-yuva"></div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-sari">13</div>`;
            altSira.innerHTML += `<div class="okey-tasi tas-sari">13</div>`; 
            altSira.innerHTML += `<div class="bos-yuva"></div>`;
        }

        socket.on('connect', () => { ekranaMesajEkle("Sistem", "Sunucu bağlantısı kuruldu!", true); });
        socket.on('lobi_mesaji_geldi', (data) => { ekranaMesajEkle(data.isim, data.mesaj, false); });
        socket.on('sistem_mesaji', (mesaj) => { ekranaMesajEkle("Sistem", mesaj, true); });

        sendBtn.addEventListener('click', mesajGonder);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') mesajGonder(); });

        function mesajGonder() {
            const metin = chatInput.value.trim();
            if (metin !== '') {
                socket.emit('lobi_mesaji_gonder', { isim: aktifKullaniciAdi, mesaj: metin });
                chatInput.value = ''; 
                chatInput.blur(); 
            }
        }

        function ekranaMesajEkle(yazar, icerik, isSystem) {
            const yeniSatir = document.createElement('div');
            yeniSatir.className = "msg-line";
            if (isSystem) {
                yeniSatir.innerHTML = `<span class="msg-author system">[${yazar}]:</span> <i>${icerik}</i>`;
            } else {
                const renk = (yazar === aktifKullaniciAdi) ? "#ffc107" : "#0dcaf0";
                yeniSatir.innerHTML = `<span class="msg-author" style="color:${renk};">${yazar}:</span> ${icerik}`;
            }
            chatMessages.appendChild(yeniSatir);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
