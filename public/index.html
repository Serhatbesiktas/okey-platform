<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #06110a; color: #fff; display: flex; height: 100dvh; overflow: hidden; }
        
        /* SOL MENÜ (Sidebar) */
        .sidebar { width: 80px; background-color: #0a1f13; border-right: 1px solid #143322; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 30px; z-index: 10; }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: #88a896; font-size: 10px; cursor: pointer; transition: 0.3s; gap: 5px; }
        .menu-item:hover, .menu-item.active { color: #ffc107; }
        .menu-icon { font-size: 24px; }
        
        /* ANA İÇERİK ALANI */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: radial-gradient(circle at center, #0d2e1d 0%, #06110a 100%); }
        
        /* ÜST BAR (Top Bar) */
        .top-bar { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .profil-alani { display: flex; align-items: center; gap: 15px; }
        .avatar-yuvarlak { width: 50px; height: 50px; background-color: #14422b; border: 2px solid #20c997; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .kullanici-bilgi { display: flex; flex-direction: column; }
        .kullanici-isim { font-weight: bold; font-size: 16px; color: #fff; display: flex; align-items: center; gap: 5px; }
        .vip-rozet { font-size: 10px; background: #ffc107; color: #000; padding: 2px 6px; border-radius: 10px; font-weight: bold; display: none;}
        .kullanici-cip { font-size: 14px; color: #ffc107; font-weight: bold; margin-top: 2px; }
        
        /* MASA LİSTESİ */
        .masa-container { padding: 30px; }
        .kategori-baslik { font-size: 14px; color: #88a896; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        .masa-kart { background-color: #0a1f13; border: 1px solid #143322; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .masa-kart:hover { transform: translateY(-2px); border-color: #20c997; }
        
        .masa-sol { display: flex; align-items: center; gap: 15px; }
        .masa-ikon { width: 40px; height: 40px; background: #14422b; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .masa-detay h3 { font-size: 16px; color: #fff; margin-bottom: 5px; }
        .masa-detay p { font-size: 12px; color: #ffc107; font-weight: bold; }
        
        .masa-orta { display: flex; gap: -5px; }
        .kucuk-avatar { width: 30px; height: 30px; border-radius: 50%; background: #2c3e50; border: 2px solid #0a1f13; display: flex; justify-content: center; align-items: center; font-size: 14px; margin-left: -10px; }
        
        .oyna-btn { background: #20c997; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .oyna-btn:hover { background: #1aab82; }
        .oyna-btn.dolu { background: #34495e; color: #a0a0a0; cursor: not-allowed; }

        /* MASA EKRANI (Şimdilik Gizli, sonraki adımda detaylandıracağız) */
        #masaEkrani { display: none; width: 100%; height: 100%; background: #0d2e1d; justify-content: center; align-items: center; font-size: 24px; color: #ffc107; flex-direction: column;}
        .geridon-btn { margin-top: 20px; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 8px; cursor: pointer;}
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="menu-item active">
            <span class="menu-icon">🏠</span>
            <span>Lobi</span>
        </div>
        <div class="menu-item">
            <span class="menu-icon">👤</span>
            <span>Profil</span>
        </div>
        <div class="menu-item">
            <span class="menu-icon">🏆</span>
            <span>Sıralama</span>
        </div>
        <div class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span>Ayarlar</span>
        </div>
    </div>

    <div class="main-content" id="lobiEkrani">
        
        <div class="top-bar">
            <div class="profil-alani">
                <div class="avatar-yuvarlak">😎</div>
                <div class="kullanici-bilgi">
                    <div class="kullanici-isim">
                        <span id="benimAdim">Bağlanıyor...</span>
                        <span class="vip-rozet" id="vipRozet">VIP</span>
                    </div>
                    <div class="kullanici-cip">💰 <span id="benimCipim">0</span> ÇİP</div>
                </div>
            </div>
            
            <button style="background: #ffc107; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                ÇİP SATIN AL
            </button>
        </div>

        <div class="masa-container">
            <div class="kategori-baslik">Masa Seç</div>
            <div id="masalarAlani">
                </div>
        </div>
    </div>

    <div id="masaEkrani">
        <div>Masa Tasarımı 2. Adımda Eklenecek!</div>
        <button class="geridon-btn" onclick="lobiyeDon()">Lobiye Dön</button>
    </div>

    <script>
        const socket = io();
        let aktifKullaniciAdi = localStorage.getItem('vip_okey_isim') || "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        
        document.getElementById('benimAdim').innerText = aktifKullaniciAdi;

        socket.on('connect', () => {
            socket.emit('kullanici_girisi', aktifKullaniciAdi);
        });

        socket.on('cip_guncelle', (cip) => { 
            document.getElementById('benimCipim').innerText = cip.toLocaleString('tr-TR'); 
        });

        socket.on('vip_guncelle', (vipMi) => {
            document.getElementById('vipRozet').style.display = vipMi ? 'inline-block' : 'none';
        });

        socket.on('masalari_guncelle', (lobidekiMasalar) => {
            const masalarAlani = document.getElementById('masalarAlani');
            masalarAlani.innerHTML = ''; 

            for (const [masaAdi, koltuklar] of Object.entries(lobidekiMasalar)) {
                const doluKoltukSayisi = koltuklar.filter(k => k !== null).length;
                let bahis = masaAdi.includes('Acemi') ? '20K' : (masaAdi.includes('Orta') ? '50K' : '100K');
                
                // Dolu koltuklar için küçük avatarlar oluştur
                let avatarHtml = '';
                for(let i=0; i<doluKoltukSayisi; i++) {
                    avatarHtml += `<div class="kucuk-avatar">👤</div>`;
                }

                const btnClass = doluKoltukSayisi >= 4 ? 'oyna-btn dolu' : 'oyna-btn';
                const btnText = doluKoltukSayisi >= 4 ? 'DOLU' : 'OYNA';

                const html = `
                    <div class="masa-kart">
                        <div class="masa-sol">
                            <div class="masa-ikon">🎲</div>
                            <div class="masa-detay">
                                <h3>${masaAdi}</h3>
                                <p>💰 ${bahis} Bahis</p>
                            </div>
                        </div>
                        
                        <div class="masa-orta" style="margin-left:auto; margin-right: 30px;">
                            ${avatarHtml}
                            <span style="font-size:12px; color:#88a896; margin-left:15px; align-self:center;">👤 ${doluKoltukSayisi} / 4</span>
                        </div>

                        <button class="${btnClass}" onclick="masayaOtur('${masaAdi}')" ${doluKoltukSayisi >= 4 ? 'disabled' : ''}>
                            ${btnText}
                        </button>
                    </div>`;
                masalarAlani.innerHTML += html;
            }
        });

        window.masayaOtur = function(masaAdi) {
            socket.emit('masaya_otur', { isim: aktifKullaniciAdi, masaAdi: masaAdi });
            document.getElementById('lobiEkrani').style.display = 'none';
            document.querySelector('.sidebar').style.display = 'none';
            document.getElementById('masaEkrani').style.display = 'flex';
        };

        window.lobiyeDon = function() {
            document.getElementById('masaEkrani').style.display = 'none';
            document.getElementById('lobiEkrani').style.display = 'flex';
            document.querySelector('.sidebar').style.display = 'flex';
        };
    </script>
</body>
</html>
