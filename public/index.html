<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Sunucusu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d2e1d; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background-color: #081e13; border-bottom: 2px solid #14422b; flex-shrink: 0; }
        .logo { color: #ffc107; font-weight: bold; font-size: 14px; }
        .stats-box { background-color: #14422b; padding: 5px 10px; border-radius: 5px; border: 1px solid #198754; font-size: 11px; text-align: center; }
        .stats-box span { color: #20c997; display: block; font-weight: bold; font-size: 14px;}
        .user-box { background-color: #ffc107; color: #000; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 12px; }

        .main-container { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }

        #lobiEkrani { display: flex; flex-direction: column; flex: 1; }
        .tables-panel { padding: 10px; display: flex; flex-direction: column; gap: 15px; }
        .table-card { background-color: #14422b; border: 2px solid #198754; border-radius: 10px; padding: 15px 10px; text-align: center; }
        .table-title { color: #ffc107; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .mini-table-container { position: relative; height: 130px; margin: 0 auto 15px auto; width: 100%; max-width: 250px; background-color: rgba(0,0,0,0.15); border-radius: 10px; }
        .mini-okey-table { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 50px; background-color: #1a5c38; border: 2px solid #0a2014; border-radius: 25px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .mini-seat { position: absolute; font-size: 10px; line-height: 1.2; text-align: center; width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mini-seat.occupied { color: #0dcaf0; font-weight: bold; }
        .mini-seat.empty { color: #a0a0a0; font-style: italic; }
        .mini-top { top: 5px; left: 50%; transform: translateX(-50%); }
        .mini-bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .mini-left { top: 50%; left: 5px; transform: translateY(-50%); }
        .mini-right { top: 50%; right: 5px; transform: translateY(-50%); }
        .sit-btn { background-color: #ffc107; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; transition: 0.3s; }
        .sit-btn.disabled { background-color: #6c757d; color: #fff; cursor: not-allowed; }
        .players-panel { background-color: #0b2417; border-top: 2px solid #14422b; padding: 10px; }
        .panel-title { font-size: 14px; margin-bottom: 10px; color: #0dcaf0; display: flex; gap: 5px; }
        .player-table { width: 100%; font-size: 12px; text-align: left; border-collapse: collapse; }
        .player-table th { color: #a0a0a0; padding-bottom: 5px; border-bottom: 1px solid #14422b; }
        .player-table td { padding: 8px 0; border-bottom: 1px solid #0d2e1d; }
        .status-dot { width: 8px; height: 8px; background-color: #20c997; border-radius: 50%; display: inline-block; margin-right: 5px; }

        #masaEkrani { display: none; flex: 1; background-color: #0a2014; position: relative; padding: 10px; flex-direction: column; }
        .okey-table-ui { background-color: #1a5c38; border: 4px solid #0d2e1d; border-radius: 20px; width: 100%; flex: 1; position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); margin-bottom: 5px; overflow: hidden; }
        
        .return-lobby-btn { position: absolute; top: 5px; right: 5px; background-color: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 10; cursor: pointer; }

        .gosterge-btn { position: absolute; top: 5px; left: 5px; background-color: #0dcaf0; color: #000; border: 2px solid #fff; padding: 6px 12px; border-radius: 5px; font-weight: bold; font-size: 12px; z-index: 15; cursor: pointer; animation: flashBtn 0.8s infinite alternate; display: none; box-shadow: 0 0 15px rgba(13, 202, 240, 0.8); }
        .gosterge-btn:active { transform: scale(0.95); }
        @keyframes flashBtn { from { transform: scale(1); box-shadow: 0 0 5px rgba(13, 202, 240, 0.5); } to { transform: scale(1.05); box-shadow: 0 0 20px rgba(13, 202, 240, 1); } }

        .player-seat { position: absolute; background-color: rgba(0,0,0,0.75); padding: 6px 12px; border-radius: 8px; color: #ffc107; font-size: 12px; font-weight: bold; border: 2px solid #ffc107; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; z-index: 5; text-align: center; transition: 0.3s; }
        .seat-top { top: 10px; left: 50%; transform: translateX(-50%); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-right { top: 25%; right: -25px; transform: translateY(-50%) rotate(-90deg); border-color: #0dcaf0; color: #0dcaf0; }
        .seat-left { bottom: 25%; left: -25px; transform: translateY(-50%) rotate(90deg); border-color: #0dcaf0; color: #0dcaf0; }
        
        .aktif-sira { box-shadow: 0 0 15px 5px #20c997; border-color: #20c997 !important; color: #fff !important; }

        .iskarta-alani { position: absolute; width: 44px; height: 60px; background-color: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; z-index: 4; }
        #iskartaUst { top: 15px; left: 25%; }
        #iskartaSag { top: 25%; right: 30px; transform: translateY(-50%); }
        #iskartaSol { bottom: 25%; left: 30px; transform: translateY(50%); cursor: pointer; }
        #iskartaSol:active { transform: translateY(50%) scale(0.9); }
        
        #benimIskartam { position: absolute; bottom: 100px; right: 15px; width: 60px; height: 80px; background-color: rgba(0,0,0,0.4); border: 3px dashed #ffc107; border-radius: 8px; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 0.2s;}
        #benimIskartam.sortable-drag-over { background-color: rgba(255, 193, 7, 0.3); border-color: #fff; }
        .iskarta-yazi { pointer-events: none; color: #ffc107; font-weight: bold; font-size: 11px; text-align: center; }
        
        .kilitli-iskarta { border-color: #dc3545 !important; opacity: 0.5; }

        .iskarta-alani .okey-tasi { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 38px !important; height: 52px !important; font-size: 18px !important; border-bottom-width: 3px !important; pointer-events: none !important; }

        .masa-ortasi { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); z-index: 4; }
        .masa-isim-ortasi { color: rgba(255,255,255,0.3); font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        
        .masa-kasa-bilgisi { display: none; color: #20c997; font-weight: bold; font-size: 14px; text-shadow: 0 0 5px rgba(32, 201, 151, 0.5); border: 1px dashed #20c997; padding: 4px 10px; border-radius: 10px; background-color: rgba(0,0,0,0.5); }

        .oyun-baslat-btn { background-color: #ffc107; color: #000; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); margin-top: 5px; }
        .oyun-baslat-btn:active { transform: scale(0.95); }
        
        .kalan-tas-bilgi-container { display: none; flex-direction: column; align-items: center; gap: 8px; }
        
        .kapali-deste { width: 44px; height: 58px; background-color: #fdf6e3; border: 1px solid #d3c9b3; border-bottom: 6px solid #c0b396; border-radius: 6px; box-shadow: -3px 4px 8px rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.1s;}
        .kapali-deste:active { transform: translateY(3px); border-bottom-width: 3px; }
        
        .gosterge-tasi { width: 44px; height: 58px; background-color: #fcf5e3; border: 1px solid #d3c9b3; border-bottom: 5px solid #c0b396; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); font-family: Arial, sans-serif; pointer-events: none; }

        #bitisAlani { position: relative; display: none; width: 48px; height: 64px; background-color: rgba(220, 53, 69, 0.2); border: 2px dashed #dc3545; border-radius: 8px; align-items: center; justify-content: center; color: #dc3545; font-weight: bold; font-size: 11px; text-align: center; }
        #bitisAlani.sortable-drag-over { background-color: rgba(220, 53, 69, 0.6); color: white; border-color: white;}
        #bitisAlani .okey-tasi { position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 38px !important; height: 52px !important; font-size: 18px !important; border-bottom-width: 3px !important; pointer-events: none !important; }

        #sonucEkrani { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .sonuc-kutu { background: #14422b; border: 4px solid #ffc107; padding: 30px; border-radius: 20px; text-align: center; color: white; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: 0.3s;}
        #sonucBaslik { color: #ffc107; font-size: 28px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        #sonucMetin { font-size: 16px; margin-bottom: 15px; color: #fff; }
        #sonucOdul { font-size: 24px; font-weight: bold; color: #20c997; margin-bottom: 25px; text-shadow: 0 0 10px rgba(32, 201, 151, 0.4); }
        .sonuc-btn { background-color: #ffc107; color: #000; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
        .sonuc-btn:active { transform: scale(0.95); }

        .okey-animasyon { animation: alevAlev 0.5s infinite alternate !important; border-color: #dc3545 !important; box-shadow: 0 0 50px #dc3545 !important; }
        @keyframes alevAlev { from { transform: scale(1); } to { transform: scale(1.05); } }

        .emoji-bar { display: none; padding: 5px; background: #081e13; border-top: 2px solid #14422b; gap: 15px; justify-content: center; }
        .emoji-btn { background: none; border: none; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .emoji-btn:active { transform: scale(1.3); }

        .pro-tus-takimi { width: 100%; display: flex; justify-content: flex-start; align-items: center; padding: 2px 10px; margin-bottom: 4px; z-index: 10; gap: 10px; }
        .pro-tus { padding: 0 15px; height: 35px; background-color: #14422b; border: 1px solid #198754; color: #ffc107; border-radius: 6px; font-weight: bold; font-size: 12px; text-transform: uppercase; cursor: pointer; box-shadow: 0 3px 5px rgba(0,0,0,0.5); }
        .pro-tus:active { transform: scale(0.95); background-color: #0d2e1d; }

        .istaka-container { width: 100%; height: 140px; background-color: #8b5a2b; border-radius: 10px; border: 4px solid #4a2c10; box-shadow: 0 10px 25px rgba(0,0,0,0.7); display: flex; flex-direction: column; padding: 4px; gap: 4px; position: relative; z-index: 20;}
        .istaka-raf { display: flex; flex: 1; width: 100%; gap: 2px; border-radius: 5px; padding: 3px 2px; }
        .raf-ust { background: linear-gradient(to bottom, #5a3819, #784c25); box-shadow: inset 0 6px 12px rgba(0,0,0,0.6); }
        .raf-alt { background: linear-gradient(to bottom, #a06b3c, #8b5a2b); box-shadow: inset 0 3px 8px rgba(0,0,0,0.4); border-top: 2px solid #a87648; }
        .yuva { flex: 1; height: 100%; background: rgba(0,0,0,0.15); border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .okey-tasi { width: 100%; height: 92%; max-width: 38px; background-color: #fcf5e3; border-radius: 6px; border: 1px solid #d3c9b3; border-bottom: 5px solid #c0b396; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: clamp(15px, 4.5vw, 22px); font-family: Arial, sans-serif; cursor: grab; touch-action: manipulation; user-select: none; -webkit-user-select: none; -webkit-user-drag: none; z-index: 30; transition: transform 0.1s;}
        .okey-tasi:active { cursor: grabbing; border-bottom-width: 2px; transform: translateY(3px); }
        .okey-tasi::after { content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; border: 1px solid rgba(0,0,0,0.05); border-radius: 4px; }
        
        .sortable-ghost { opacity: 0.1; } 
        .sortable-drag { box-shadow: 5px 15px 25px rgba(0,0,0,0.8) !important; transform: scale(1.15) translateY(-20px) !important; z-index: 99999 !important; border-bottom-width: 8px !important; }
        
        .tas-kirmizi { color: #d32f2f; } .tas-siyah { color: #212529; } .tas-mavi { color: #1976d2; } .tas-sari { color: #198754; } 

        .chat-panel { background-color: #081e13; border-top: 2px solid #14422b; display: flex; flex-direction: column; height: 180px; flex-shrink: 0; z-index: 999; }
        .chat-header { font-size: 12px; padding: 5px 10px; background-color: #05140d; color: #a0a0a0; transition: 0.3s; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .msg-line { line-height: 1.4; padding-bottom: 3px;}
        .msg-author { color: #0dcaf0; font-weight: bold; }
        .msg-author.system { color: #ffc107; }
        .chat-input-area { display: flex; padding: 8px; gap: 8px; background-color: #0b2417; padding-bottom: calc(8px + env(safe-area-inset-bottom, 10px)); }
        .chat-input-area input { flex: 1; background-color: #0d2e1d; border: 1px solid #198754; color: #fff; padding: 12px; border-radius: 5px; outline: none; font-size: 16px; }
        .chat-input-area button { background-color: #0dcaf0; color: #000; border: none; padding: 0 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }

        @media (min-width: 768px) {
            #lobiEkrani { flex-direction: row; }
            .tables-panel { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; align-content: start; }
            .players-panel { width: 350px; border-top: none; border-left: 2px solid #14422b; overflow-y: auto; }
            .istaka-container { height: 160px; max-width: 800px; margin: 0 auto; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div class="header">
        <div class="logo">🏆 VIP OKEY<br>SUNUCUSU</div>
        <div class="stats-box"><span id="benimCipim">Bağlanıyor...</span> ÇİP</div>
        <div class="user-box" id="benimAdimKutusu">Bağlanıyor...</div>
    </div>

    <div id="lobiEkrani">
        <div class="tables-panel" id="masalarAlani"></div>
        <div class="players-panel">
            <div class="panel-title">👥 Lobideki Oyuncular</div>
            <table class="player-table">
                <thead><tr><th>DRM</th><th>TAKMA AD</th><th>PUAN</th></tr></thead>
                <tbody>
                    <tr><td><span class="status-dot"></span></td><td style="color:#ffc107; font-weight:bold;" id="lobiBenimAdim">👑 Yükleniyor...</td><td>-</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="masaEkrani">
        
        <div id="sonucEkrani">
            <div class="sonuc-kutu">
                <h1 id="sonucBaslik">Oyun Bitti!</h1>
                <p id="sonucMetin">Kazanan: ...</p>
                <p id="sonucOdul"></p>
                <button class="sonuc-btn" onclick="document.getElementById('sonucEkrani').style.display='none'">MASAYA DÖN</button>
            </div>
        </div>

        <div class="okey-table-ui">
            <button class="return-lobby-btn" id="lobiyeDonBtn">⬅ Lobiye Dön</button>
            <button class="gosterge-btn" id="gostergeBtn" onclick="gostergeYap()">👁 GÖSTERGE YAP</button>
            
            <div class="player-seat seat-top" id="seatTop">Bekleniyor...</div>
            <div class="player-seat seat-left" id="seatLeft">Bekleniyor...</div>
            <div class="player-seat seat-right" id="seatRight">Bekleniyor...</div>
            
            <div class="masa-ortasi">
                <div class="masa-isim-ortasi" id="masaOrtasiYazi">MASA</div>
                <div class="masa-kasa-bilgisi" id="masaKasaBilgisi">KASA: 0 ÇİP</div>
                <button class="oyun-baslat-btn" id="oyunuBaslatBtn">🎲 OYUNU BAŞLAT</button>
                <div class="kalan-tas-bilgi-container" id="oyunAlanObjeleri">
                    <div style="display: flex; gap: 15px; align-items: center;">
                        <div class="gosterge-tasi" id="gostergeTasi" title="Gösterge"></div>
                        <div class="kapali-deste" id="kalanTasBilgi" title="Taş Çekmek İçin Tıkla">91</div>
                        
                        <div id="bitisAlani">BİTİR<br>🏆</div>
                    </div>
                </div>
            </div>

            <div class="iskarta-alani" id="iskartaUst"></div>
            <div class="iskarta-alani" id="iskartaSag"></div>
            <div class="iskarta-alani" id="iskartaSol" title="Yerden Taş Çek"></div>
            
            <div class="iskarta-alani" id="benimIskartam">
                <div class="iskarta-yazi" id="iskartaYazi">TAŞ AT<br>⬇</div>
            </div>
        </div>

        <div class="okey-istaka-tuslar-area">
            <div class="pro-tus-takimi">
                <button class="pro-tus" onclick="seriDiz()">SERİ DİZ</button>
                <button class="pro-tus" onclick="ciftDiz()">ÇİFT DİZ</button>
            </div>

            <div class="istaka-container" id="benimIstakam">
                <div class="istaka-raf raf-ust" id="ustRaf"></div>
                <div class="istaka-raf raf-alt" id="altRaf"></div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="emoji-bar" id="emojiBar">
            <button class="emoji-btn" onclick="emojiGonder('☕️')">☕️</button>
            <button class="emoji-btn" onclick="emojiGonder('😡')">😡</button>
            <button class="emoji-btn" onclick="emojiGonder('👏')">👏</button>
            <button class="emoji-btn" onclick="emojiGonder('🎯')">🎯</button>
            <button class="emoji-btn" onclick="emojiGonder('😂')">😂</button>
        </div>
        <div class="chat-header" id="chatHeader">💬 Sunucu Genel Sohbet</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesajını yaz...">
            <button id="sendBtn">GÖNDER</button>
        </div>
    </div>

    <script>
        const sesler = {
            tasSes: new Audio('https://cdn.freesound.org/previews/240/240776_4107740-lq.mp3'),
            siraSes: new Audio('https://cdn.freesound.org/previews/352/352661_4019029-lq.mp3'),
            zaferSes: new Audio('https://cdn.freesound.org/previews/270/270319_5123851-lq.mp3'),
            bitisSes: new Audio('https://cdn.freesound.org/previews/173/173859_2370618-lq.mp3') 
        };

        const socket = io();
        let aktifKullaniciAdi = localStorage.getItem('vip_okey_isim') || "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        let suAnkiMasam = null; 
        let benimSiramMi = false;
        let guncelGosterge = null; 

        document.getElementById('benimAdimKutusu').innerText = aktifKullaniciAdi;
        document.getElementById('lobiBenimAdim').innerText = "👑 " + aktifKullaniciAdi;

        // YENİ: UYKU MODU DÜZELTMESİ - Bağlantı her geldiğinde kimliği sunucuya bildir
        socket.on('connect', () => {
            socket.emit('kullanici_girisi', aktifKullaniciAdi);
            if (suAnkiMasam) {
                socket.emit('taslarimi_ver', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi });
            }
        });

        socket.on('cip_guncelle', (cip) => { document.getElementById('benimCipim').innerText = cip.toLocaleString('tr-TR'); });
        socket.on('cip_guncelle_ozel', (data) => { if(data.isim === aktifKullaniciAdi) document.getElementById('benimCipim').innerText = data.cip.toLocaleString('tr-TR'); });

        socket.on('hata_mesaji', (mesaj) => { alert(mesaj); });

        const lobiEkrani = document.getElementById('lobiEkrani');
        const masaEkrani = document.getElementById('masaEkrani');
        const masaOrtasiYazi = document.getElementById('masaOrtasiYazi');
        const masaKasaBilgisi = document.getElementById('masaKasaBilgisi');
        const masalarAlani = document.getElementById('masalarAlani');
        const lobiyeDonBtn = document.getElementById('lobiyeDonBtn');
        const oyunuBaslatBtn = document.getElementById('oyunuBaslatBtn');
        const oyunAlanObjeleri = document.getElementById('oyunAlanObjeleri');
        const kalanTasBilgi = document.getElementById('kalanTasBilgi');
        const bitisAlani = document.getElementById('bitisAlani');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatHeader = document.getElementById('chatHeader');
        const emojiBar = document.getElementById('emojiBar');
        const gostergeBtn = document.getElementById('gostergeBtn'); 

        const ustRaf = document.getElementById('ustRaf');
        const altRaf = document.getElementById('altRaf');

        function elimdekiTasSayisi() {
            let sayi = 0;
            for(let i=0; i<24; i++) {
                if(document.getElementById('y'+i).children.length > 0) sayi++;
            }
            return sayi;
        }

                    let tas = yuva.children[0];
                    let renkClass = Array.from(tas.classList).find(c => c.startsWith('tas-'));
                    let renk = renkClass ? renkClass.replace('tas-', '') : '';
                    taslar.push({ el: tas, renk: renk, sayi: parseInt(tas.innerText) || 0 });
                }
            }
            const renkDeger = { 'kirmizi': 1, 'siyah': 2, 'mavi': 3, 'sari': 4, 'sahte': 5 };
            taslar.sort((a, b) => { if (renkDeger[a.renk] !== renkDeger[b.renk]) return renkDeger[a.renk] - renkDeger[b.renk]; return a.sayi - b.sayi; });

                    taslar.push({ el: tas, renk: renk, sayi: parseInt(tas.innerText) || 0 });
                }

        socket.on('sistem_mesaji', (mesaj) => { ekranaMesajEkle("Sistem", mesaj, true); });
        
        window.emojiGonder = function(emoji) {
            if (suAnkiMasam) { socket.emit('masa_mesaji_gonder', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi, mesaj: emoji, emojiMi: true }); }
        };

        sendBtn.addEventListener('click', mesajGonder);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') mesajGonder(); });

        function mesajGonder() {
            const metin = chatInput.value.trim();
            if (metin !== '') {
                if (suAnkiMasam) {
                    socket.emit('masa_mesaji_gonder', { masaAdi: suAnkiMasam, isim: aktifKullaniciAdi, mesaj: metin, emojiMi: false });
                } else {
                    socket.emit('lobi_mesaji_gonder', { isim: aktifKullaniciAdi, mesaj: metin });
                }
                chatInput.value = ''; chatInput.blur(); 
            }
        }

        socket.on('lobi_mesaji_geldi', (data) => {
            if (!suAnkiMasam) ekranaMesajEkle(data.isim, data.mesaj, false, false);
        });

        socket.on('masa_mesaji_geldi', (data) => {
            if (suAnkiMasam === data.masaAdi) {
                if (data.emojiMi) {
                    ekranaMesajEkle(data.isim, `<span style="font-size:24px">${data.mesaj}</span>`, false, true);
                } else {
                    ekranaMesajEkle(data.isim, data.mesaj, false, true);
                }
            }
        });

        function ekranaMesajEkle(yazar, icerik, isSystem, isMasa = false) {
            const yeniSatir = document.createElement('div');
            yeniSatir.className = "msg-line";
            if (isSystem) {
                yeniSatir.innerHTML = `<span class="msg-author system">[${yazar}]:</span> <i>${icerik}</i>`;
            } else {
                const renk = (yazar === aktifKullaniciAdi) ? "#ffc107" : (isMasa ? "#20c997" : "#0dcaf0");
                const tag = isMasa ? "<b>[Masa]</b> " : "";
                yeniSatir.innerHTML = `<span class="msg-author" style="color:${renk};">${tag}${yazar}:</span> ${icerik}`;
            }
            chatMessages.appendChild(yeniSatir);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
