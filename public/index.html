<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey Lobi</title>
    <style>
        /* TEMEL AYARLAR VE KARANLIK TEMA */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #06110a; color: #fff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* ÜST PROFİL BAR (Top Bar) */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #0a1b12; border-bottom: 1px solid #143322; z-index: 10; }
        .profil-sol { display: flex; align-items: center; gap: 12px; }
        .avatar-kutu { position: relative; }
        .avatar-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ffc107; background: #1a3c28; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .seviye-rozet { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); background: #111; color: #ffc107; font-size: 9px; padding: 2px 6px; border-radius: 10px; border: 1px solid #ffc107; font-weight: bold; }
        
        .profil-bilgi { display: flex; flex-direction: column; justify-content: center; }
        .isim-kutu { display: flex; align-items: center; gap: 5px; }
        .kullanici-adi { font-size: 15px; font-weight: bold; }
        .mavi-tik { color: #1da1f2; font-size: 12px; }
        .vip-gold { font-size: 10px; color: #000; background: #ffc107; padding: 2px 5px; border-radius: 4px; font-weight: bold; margin-top: 3px; display: inline-block; width: fit-content; }

        .profil-sag { display: flex; align-items: center; gap: 10px; }
        .cip-kutu { background: #143322; border: 1px solid #1f4a32; border-radius: 20px; padding: 5px 15px 5px 5px; display: flex; align-items: center; gap: 8px; }
        .cip-ikon { width: 24px; height: 24px; background: #ffc107; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 12px; }
        .cip-miktar { font-size: 14px; font-weight: bold; }
        .artı-btn { color: #20c997; font-weight: bold; font-size: 18px; margin-left: 5px; cursor: pointer; }
        
        .ust-ikonlar { display: flex; gap: 15px; margin-left: 10px; }
        .ust-ikon { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #88a896; cursor: pointer; }
        .ust-ikon i { font-size: 20px; color: #fff; margin-bottom: 2px; font-style: normal; }

        /* ANA İÇERİK: MASALAR LİSTESİ */
        .main-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 90px; }
        
        .kategori-baslik { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .kategori-baslik h2 { font-size: 14px; color: #88a896; letter-spacing: 1px; text-transform: uppercase; }
        .filtre-menusu { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .filtre-btn { background: #0a1b12; border: 1px solid #143322; color: #88a896; padding: 6px 15px; border-radius: 20px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filtre-btn.aktif { background: #143322; color: #20c997; border-color: #20c997; }

        /* MODERN MASA KARTLARI */
        .masa-kart { background: #0d2217; border: 1px solid #173b28; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; transition: 0.2s; }
        .masa-kart:active { transform: scale(0.98); }
        
        .masa-sol { display: flex; align-items: center; gap: 15px; }
        .zar-kutu { width: 45px; height: 45px; background: #143322; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
        .masa-isim { font-size: 15px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .masa-etiket { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .etiket-yesil { background: rgba(32, 201, 151, 0.2); color: #20c997; }
        .etiket-mor { background: rgba(156, 39, 176, 0.2); color: #e040fb; }
        .etiket-gold { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        .masa-bahis { font-size: 12px; color: #ffc107; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        .masa-sag { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .doluluk-durum { display: flex; align-items: center; gap: 10px; }
        .mini-avatarlar { display: flex; }
        .mini-avatar { width: 22px; height: 22px; border-radius: 50%; background: #2c3e50; border: 2px solid #0d2217; margin-left: -8px; display: flex; justify-content: center; align-items: center; font-size: 10px; }
        .mini-avatar.bos { background: #143322; border: 1px dashed #2a5a40; color: transparent; }
        .kisi-sayisi { font-size: 12px; color: #88a896; font-weight: bold; }
        
        .oyna-btn { background: #20c997; color: #000; border: none; padding: 8px 24px; border-radius: 8px; font-weight: bold; font-size: 13px; cursor: pointer; box-shadow: 0 4px 10px rgba(32, 201, 151, 0.3); }
        .oyna-btn.dolu { background: #143322; color: #88a896; box-shadow: none; cursor: not-allowed; }

        /* ALT NAVİGASYON BARI (Bottom Nav) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #06110a; border-top: 1px solid #143322; display: flex; justify-content: space-around; padding: 10px 0 20px 0; z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #88a896; font-size: 11px; text-decoration: none; cursor: pointer; }
        .nav-item i { font-size: 22px; font-style: normal; }
        .nav-item.aktif { color: #20c997; }
        
        /* ORTADAKİ BÜYÜK "HEMEN OYNA" BUTONU */
        .hemen-oyna-kutu { background: #ffc107; color: #000; padding: 10px 25px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; transform: translateY(-15px); box-shadow: 0 5px 15px rgba(255, 193, 7, 0.3); cursor: pointer; border: 2px solid #111; }
        .hemen-oyna-kutu span { font-weight: 900; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .hemen-oyna-kutu small { font-size: 9px; font-weight: bold; opacity: 0.8; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="top-bar">
        <div class="profil-sol">
            <div class="avatar-kutu">
                <div class="avatar-img">😎</div>
                <div class="seviye-rozet">Lv.42</div>
            </div>
            <div class="profil-bilgi">
                <div class="isim-kutu">
                    <span class="kullanici-adi" id="benimAdim">Yükleniyor...</span>
                    <span class="mavi-tik">✔</span>
                </div>
                <span class="vip-gold" id="vipRozet">VIP GOLD</span>
            </div>
        </div>
        
        <div class="profil-sag">
            <div class="cip-kutu">
                <div class="cip-ikon">C</div>
                <span class="cip-miktar" id="benimCipim">0</span>
                <span class="artı-btn">+</span>
            </div>
            <div class="ust-ikonlar">
                <div class="ust-ikon"><i>🎁</i><span>Ödül</span></div>
                <div class="ust-ikon"><i>⚙️</i><span>Ayarlar</span></div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="kategori-baslik">
            <h2>Masa Seç</h2>
            <span style="font-size: 12px; color: #88a896;">Çevrimiçi: <span style="color:#20c997; font-weight:bold;">1.248</span></span>
        </div>
        
        <div class="filtre-menusu">
            <div class="filtre-btn aktif">Tümü</div>
            <div class="filtre-btn">Yeni Başlayan</div>
            <div class="filtre-btn">Orta</div>
            <div class="filtre-btn">Profesyonel</div>
            <div class="filtre-btn">VIP</div>
        </div>

        <div id="masalarAlani" style="margin-top: 15px;">
            </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item aktif"><i>🏠</i><span>Lobi</span></div>
        <div class="nav-item"><i>👥</i><span>Arkadaşlar</span></div>
        
        <div class="hemen-oyna-kutu">
            <span>⚡ HEMEN OYNA</span>
            <small>Rastgele Masa</small>
        </div>
        
        <div class="nav-item"><i>🏆</i><span>Turnuvalar</span></div>
        <div class="nav-item"><i>🛒</i><span>Mağaza</span></div>
    </div>

    <script>
        const socket = io();
        let aktifKullaniciAdi = localStorage.getItem('vip_okey_isim') || "Oyuncu_" + Math.floor(Math.random() * 900 + 100);
        document.getElementById('benimAdim').innerText = aktifKullaniciAdi;

        socket.on('connect', () => { socket.emit('kullanici_girisi', aktifKullaniciAdi); });

        socket.on('cip_guncelle', (cip) => { 
            document.getElementById('benimCipim').innerText = cip.toLocaleString('tr-TR'); 
        });

        // Sunucudan gelen verilerle masaları çiz
        socket.on('masalari_guncelle', (lobidekiMasalar) => {
            const masalarAlani = document.getElementById('masalarAlani');
            masalarAlani.innerHTML = ''; 

            for (const [masaAdi, koltuklar] of Object.entries(lobidekiMasalar)) {
                const doluSayisi = koltuklar.filter(k => k !== null).length;
                
                // Bahis miktarını ve etiketi isme göre otomatik ayarla
                let bahis, etiketHtml;
                if(masaAdi.includes('Acemi')) { bahis = '20K'; etiketHtml = '<span class="masa-etiket etiket-yesil">Yeni Başlayan</span>'; }
                else if(masaAdi.includes('Orta')) { bahis = '50K'; etiketHtml = '<span class="masa-etiket etiket-yesil">Orta Seviye</span>'; }
                else { bahis = '100K'; etiketHtml = '<span class="masa-etiket etiket-mor">Pro</span>'; }

                // Avatar noktalarını oluştur (Doluysa gülen yüz, boşsa boş kutu)
                let avatarHtml = '';
                for(let i=0; i<4; i++) {
                    if(i < doluSayisi) avatarHtml += `<div class="mini-avatar">👤</div>`;
                    else avatarHtml += `<div class="mini-avatar bos"></div>`;
                }

                const btnClass = doluSayisi >= 4 ? 'oyna-btn dolu' : 'oyna-btn';
                const btnText = doluSayisi >= 4 ? 'DOLU' : 'OYNA';

                const html = `
                    <div class="masa-kart">
                        <div class="masa-sol">
                            <div class="zar-kutu">🎲</div>
                            <div>
                                <div class="masa-isim">${masaAdi} ${etiketHtml}</div>
                                <div class="masa-bahis">💰 ${bahis} Bahis</div>
                            </div>
                        </div>
                        <div class="masa-sag">
                            <div class="doluluk-durum">
                                <div class="mini-avatarlar">${avatarHtml}</div>
                                <span class="kisi-sayisi">${doluSayisi} / 4</span>
                            </div>
                            <button class="${btnClass}" ${doluSayisi >= 4 ? 'disabled' : ''}>${btnText}</button>
                        </div>
                    </div>`;
                masalarAlani.innerHTML += html;
            }
        });
    </script>
</body>
</html>
