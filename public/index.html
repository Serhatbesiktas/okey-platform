<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Okey - Çalışan Motor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background: #040b07; color: #fff; height: 100dvh; overflow: hidden; }
        
        /* OYUN ALANI */
        #masaEkrani { display: flex; flex-direction: column; height: 100%; width: 100%; background: #020603; }
        .oyun-alani { flex: 1; position: relative; background: radial-gradient(circle, #1e7040 0%, #082e16 100%); margin: 10px; border-radius: 20px; display: flex; justify-content: center; align-items: center; }
        
        /* TAŞLAR VE ISTAKA */
        .istaka { width: 95%; height: 130px; background: #38200e; border-radius: 10px; margin: 0 auto 10px; display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; padding: 5px; gap: 3px; }
        .okey-tasi { width: 35px; height: 50px; background: #f5f0e1; border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 20px; border-bottom: 3px solid #ccc; cursor: pointer; }
        .secili { transform: translateY(-10px); border: 2px solid #20c997; }
        
        /* BUTONLAR */
        .buton-bar { display: flex; gap: 5px; padding: 0 10px 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-diz { background: #1a4831; color: #fff; }
        .btn-cift { background: #5d4037; color: #fff; }
        .btn-at { background: #d32f2f; color: #fff; }

        .bot-baslat { background: #ffc107; color: #000; padding: 10px; margin: 10px; font-weight: bold; border-radius: 8px; border: none; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="masaEkrani">
        <div style="padding:10px; display:flex; justify-content:space-between;">
            <button onclick="masadanKalk()">⬅ Çıkış</button>
            <button class="bot-baslat" onclick="testBaslat()" id="testBtn">🤖 Botlarla Oyna</button>
        </div>

        <div class="oyun-alani" id="masaAlani">
            <div id="ortadakiTaslar" style="display:flex; gap:10px;"></div>
        </div>

        <div class="istaka" id="benimIstakam"></div>

        <div class="buton-bar">
            <button class="btn-diz" onclick="diz('seri')">Seri Diz</button>
            <button class="btn-cift" onclick="diz('cift')">Çifte Git</button>
            <button class="btn-at" onclick="tasAt()">Taş At</button>
        </div>
    </div>

    <script>
        const socket = io();
        let aktifKullaniciAdi = "Oyuncu_" + Math.floor(Math.random() * 900);
        let mevcutMasa = "Acemiler (20K Bahis)"; // Test için sabit
        let elimdekiTaslar = [];
        let seciliTasId = null;

        socket.emit('kullanici_girisi', aktifKullaniciAdi);
        socket.emit('masaya_otur', { isim: aktifKullaniciAdi, masaAdi: mevcutMasa });
        document.getElementById('masaEkrani').style.display = 'flex';

        socket.on('elimi_guncelle', (data) => {
            elimdekiTaslar = data.el;
            elimiCiz();
        });

        function elimiCiz() {
            const istaka = document.getElementById('benimIstakam');
            istaka.innerHTML = '';
            elimdekiTaslar.forEach(tas => {
                let div = document.createElement('div');
                div.className = `okey-tasi ${seciliTasId === tas.id ? 'secili' : ''}`;
                div.innerHTML = tas.sayi;
                div.onclick = () => { seciliTasId = tas.id; elimiCiz(); };
                div.ondblclick = () => { seciliTasId = tas.id; tasAt(); };
                istaka.appendChild(div);
            });
        }

        function tasAt() {
            if(!seciliTasId) return alert("Taş seç!");
            elimdekiTaslar = elimdekiTaslar.filter(t => t.id !== seciliTasId);
            const orta = document.getElementById('ortadakiTaslar');
            orta.innerHTML += `<div class="okey-tasi" style="background:#444; color:#fff;">${seciliTasId}</div>`;
            seciliTasId = null;
            elimiCiz();
        }

        function diz(tip) {
            if(tip === 'seri') {
                elimdekiTaslar.sort((a, b) => a.sayi - b.sayi);
            } else {
                // Basit çifte git mantığı (ayni sayilar yanyana)
                elimdekiTaslar.sort((a, b) => a.sayi - b.sayi);
            }
            elimiCiz();
        }

        function testBaslat() { socket.emit('test_oyunu_baslat', mevcutMasa); }
        function masadanKalk() { location.reload(); }
    </script>
</body>
</html>
